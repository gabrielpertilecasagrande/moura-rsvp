<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Evento — Moura One</title>
  <link rel="icon" href="/assets/img/favicon.ico" sizes="any" />
  <link rel="stylesheet" href="/assets/css/styles.css" />
  <style>
    .tab-bar { display:flex; gap:4px; border-bottom:2px solid var(--gray); margin-bottom:24px; flex-wrap:wrap; }
    .tab-bar button { background:none; border:none; padding:10px 18px; font:500 14px var(--body); color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; border-radius:0; }
    .tab-bar button.active { color:var(--navy); border-bottom-color:var(--navy); }
    .tab-pane { display:none; }
    .tab-pane.active { display:block; }
    .diary-entry { padding:14px 0; border-bottom:1px solid var(--gray-soft); }
    .diary-entry:last-child { border-bottom:none; }
    .diary-meta { font-size:12px; color:var(--muted); margin-bottom:4px; }
    .diary-text { white-space:pre-wrap; font-size:14px; line-height:1.6; }
    .file-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--gray-soft); }
    .file-row:last-child { border-bottom:none; }
    .file-icon { font-size:20px; }
    .file-info { flex:1; min-width:0; }
    .file-name { font-size:14px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .file-meta { font-size:12px; color:var(--muted); }
    .drop-zone { border:2px dashed var(--gray); border-radius:var(--radius); padding:32px; text-align:center; color:var(--muted); cursor:pointer; transition:border-color .2s, background .2s; }
    .drop-zone.drag-over { border-color:var(--cyan); background:var(--cyan-soft); }
    .checklist-item { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--gray-soft); }
    .checklist-item:last-child { border-bottom:none; }
    .checklist-check { width:18px; height:18px; cursor:pointer; accent-color:var(--cyan); }
    .checklist-info { flex:1; }
    .checklist-title { font-size:14px; font-weight:500; }
    .checklist-meta { font-size:12px; color:var(--muted); margin-top:2px; }
    .checklist-item.done .checklist-title { text-decoration:line-through; color:var(--muted); }
    .contract-row td { vertical-align:middle; }
  </style>
</head>
<body>
  <div class="admin-shell">
    <div id="shell"></div>
    <main class="main">
      <div class="page-head">
        <div>
          <div class="eyebrow" id="eventClient"></div>
          <h1 id="eventName">Carregando…</h1>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <span id="eventStatusPill"></span>
          <a href="/admin/events.html" class="btn btn-ghost">← Eventos</a>
          <button class="btn btn-ghost btn-sm" id="exportPdfBtn">⬇ Exportar PDF</button>
          <button class="btn btn-ghost btn-sm" id="duplicateBtn">Duplicar</button>
          <a href="#" class="btn btn-ghost btn-sm" id="editEventBtn">Editar</a>
        </div>
      </div>

      <div id="coverArea" style="margin-bottom:20px"></div>
      <input type="file" id="coverInput" accept="image/*" style="display:none" />

      <div class="tab-bar" id="tabBar">
        <button class="active" data-tab="overview">Visão Geral</button>
        <button data-tab="contracts">Contratações <span id="contractsCount" class="nav-badge hidden"></span></button>
        <button data-tab="checklist">Checklist <span id="checklistCount" class="nav-badge hidden"></span></button>
        <button data-tab="files">Arquivos</button>
        <button data-tab="diary">Diário</button>
      </div>

      <!-- Aba: Visão Geral -->
      <div class="tab-pane active" id="tab-overview">
        <div class="card" id="overviewCard" style="max-width:680px"></div>
      </div>

      <!-- Aba: Contratações -->
      <div class="tab-pane" id="tab-contracts">
        <div class="page-head" style="margin-bottom:16px">
          <div id="contractsTotal" class="muted" style="font-size:14px"></div>
          <button class="btn btn-primary btn-sm" id="addContractBtn">+ Adicionar contratação</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Fornecedor</th>
                <th>Categoria</th>
                <th>Valor</th>
                <th>Status</th>
                <th>Pagamento</th>
                <th>Data pagto</th>
                <th>Observações</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="contractsBody"></tbody>
          </table>
        </div>
      </div>

      <!-- Aba: Checklist -->
      <div class="tab-pane" id="tab-checklist">
        <div class="page-head" style="margin-bottom:16px">
          <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
            <input type="text" id="checklistSearch" placeholder="Buscar tarefa…" style="padding:6px 10px;border:1px solid var(--gray-soft);border-radius:6px;font-size:13px;min-width:160px" oninput="checklistFilters.search=this.value;renderChecklist(eventData?.checklist)" />
            <select id="checklistFilter" class="btn btn-ghost btn-sm">
              <option value="">Todos os status</option>
              <option value="Pendente">Pendente</option>
              <option value="Em andamento">Em andamento</option>
              <option value="Concluído">Concluído</option>
            </select>
            <select id="checklistPriorityFilter" class="btn btn-ghost btn-sm" onchange="checklistFilters.priority=this.value;renderChecklist(eventData?.checklist)">
              <option value="">Todas as prioridades</option>
              <option value="Crítica">Crítica</option>
              <option value="Alta">Alta</option>
              <option value="Média">Média</option>
              <option value="Baixa">Baixa</option>
            </select>
            <input type="text" id="checklistRespFilter" placeholder="Responsável" style="padding:6px 10px;border:1px solid var(--gray-soft);border-radius:6px;font-size:13px;min-width:120px" oninput="checklistFilters.responsible=this.value;renderChecklist(eventData?.checklist)" />
            <select id="checklistSort" class="btn btn-ghost btn-sm" onchange="checklistFilters.sort=this.value;renderChecklist(eventData?.checklist)">
              <option value="">Ordenar por…</option>
              <option value="priority">Prioridade</option>
              <option value="due_date">Prazo</option>
              <option value="status">Status</option>
              <option value="responsible">Responsável</option>
            </select>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-ghost btn-sm" id="applyTemplateBtn" title="Gerar as tarefas padrão do tipo do evento">✨ Gerar do modelo</button>
            <button class="btn btn-primary btn-sm" id="addTaskBtn">+ Nova tarefa</button>
          </div>
        </div>
        <div id="checklistList"></div>
      </div>

      <!-- Aba: Arquivos -->
      <div class="tab-pane" id="tab-files">
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap">
          <input type="text" id="fileSearch" placeholder="Buscar arquivo…" style="padding:6px 10px;border:1px solid var(--gray-soft);border-radius:6px;font-size:13px;min-width:160px" oninput="fileSearchQuery=this.value;renderFiles(eventData?.files)" />
          <select id="fileCategory" style="padding:6px 10px;border:1px solid var(--gray-soft);border-radius:6px;font-size:13px">
            <option value="Outros">Categoria para upload</option>
            <option value="Contratos">Contratos</option>
            <option value="Orçamentos">Orçamentos</option>
            <option value="Plantas">Plantas</option>
            <option value="Artes">Artes</option>
            <option value="Cronogramas">Cronogramas</option>
            <option value="Notas fiscais">Notas fiscais</option>
            <option value="Fotos">Fotos</option>
            <option value="Documentos do cliente">Documentos do cliente</option>
            <option value="Documentos de fornecedores">Documentos de fornecedores</option>
            <option value="Outros">Outros</option>
          </select>
          <select id="fileFilter" style="padding:6px 10px;border:1px solid var(--gray-soft);border-radius:6px;font-size:13px">
            <option value="">Filtrar por categoria</option>
            <option value="Contratos">Contratos</option>
            <option value="Orçamentos">Orçamentos</option>
            <option value="Plantas">Plantas</option>
            <option value="Artes">Artes</option>
            <option value="Cronogramas">Cronogramas</option>
            <option value="Notas fiscais">Notas fiscais</option>
            <option value="Fotos">Fotos</option>
            <option value="Documentos do cliente">Documentos do cliente</option>
            <option value="Documentos de fornecedores">Documentos de fornecedores</option>
            <option value="Outros">Outros</option>
          </select>
        </div>
        <div class="drop-zone" id="dropZone">
          <div style="font-size:32px;margin-bottom:8px">📎</div>
          <div style="font-weight:600;margin-bottom:4px">Arraste arquivos aqui</div>
          <div class="muted" style="font-size:13px">ou <span style="color:var(--cyan);cursor:pointer" id="browseFiles">clique para selecionar</span> · Máximo 20 MB por arquivo</div>
          <input type="file" id="fileInput" style="display:none" multiple />
        </div>
        <div id="fileList" style="margin-top:16px"></div>
      </div>

      <!-- Aba: Diário -->
      <div class="tab-pane" id="tab-diary">
        <div class="card" style="max-width:680px;margin-bottom:20px">
          <div class="field">
            <label>Novo registro</label>
            <textarea id="diaryEntry" rows="3" placeholder="O que aconteceu hoje?"></textarea>
          </div>
          <button class="btn btn-primary btn-sm" id="saveDiaryBtn">Registrar</button>
        </div>
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:16px;max-width:680px">
          <input type="text" id="diarySearchInput" placeholder="Buscar no diário…" style="flex:1;padding:7px 12px;border:1px solid var(--gray-soft);border-radius:6px;font-size:13px" />
          <button class="btn btn-ghost btn-sm" id="exportDiaryBtn">⬇ Exportar PDF</button>
        </div>
        <div id="diaryList" style="max-width:680px"></div>
      </div>
    </main>
  </div>
  <div id="modalSlot"></div>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/shell.js"></script>
  <script src="/assets/js/admin-event-detail.js"></script>
</body>
</html>
