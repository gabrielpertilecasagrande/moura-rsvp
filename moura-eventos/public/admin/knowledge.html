<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Base de Conhecimento — Moura One</title>
  <link rel="icon" href="/assets/img/favicon.ico" sizes="any" />
  <link rel="stylesheet" href="/assets/css/styles.css" />
  <style>
    .kb-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; margin-top:20px; }
    .kb-card { background:var(--white); border:1px solid var(--gray-soft); border-radius:var(--radius); padding:18px 20px; cursor:pointer; transition:box-shadow .15s; }
    .kb-card:hover { box-shadow:0 4px 16px rgba(0,0,0,.08); }
    .kb-title { font-size:15px; font-weight:600; margin-bottom:6px; color:var(--navy); }
    .kb-excerpt { font-size:13px; color:var(--muted); line-height:1.5; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
    .kb-meta { font-size:11px; color:var(--muted); margin-top:10px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .kb-actions { display:flex; gap:6px; margin-top:12px; }
    .kb-view { background:var(--off-white); border-radius:var(--radius); padding:20px 24px; max-width:700px; }
    .kb-view h2 { font-size:20px; color:var(--navy); margin-bottom:8px; }
    .kb-view .rich { font-size:14px; line-height:1.7; margin-top:16px; }
    .kb-empty { text-align:center; padding:48px; color:var(--muted); }
    .kb-empty .ico { font-size:40px; margin-bottom:12px; }
  </style>
</head>
<body>
  <div class="admin-shell">
    <div id="shell"></div>
    <main class="main">
      <div class="page-head">
        <div>
          <div class="eyebrow">Gestão</div>
          <h1>Base de Conhecimento</h1>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <input type="text" id="searchInput" placeholder="Buscar artigos…" style="padding:7px 12px;border:1px solid var(--gray-soft);border-radius:6px;font-size:13px;min-width:200px" />
          <select id="catFilter" style="padding:7px 12px;border:1px solid var(--gray-soft);border-radius:6px;font-size:13px">
            <option value="">Todas as categorias</option>
            <option>Processos</option>
            <option>Modelos e templates</option>
            <option>Fornecedores</option>
            <option>Boas práticas</option>
            <option>Jurídico / Contratos</option>
            <option>Outros</option>
          </select>
          <button class="btn btn-primary btn-sm" id="newArticleBtn" style="display:none">+ Novo artigo</button>
        </div>
      </div>
      <div id="kbContent"></div>
    </main>
  </div>
  <div id="modalSlot"></div>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/shell.js"></script>
  <script src="/assets/js/admin-knowledge.js"></script>
</body>
</html>
