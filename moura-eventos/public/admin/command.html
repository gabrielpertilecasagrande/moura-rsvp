<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Central de Comando — Moura One</title>
  <link rel="icon" href="/assets/img/favicon.ico" sizes="any" />
  <link rel="stylesheet" href="/assets/css/styles.css" />
  <style>
    .cc-insights { display:flex; flex-direction:column; gap:8px; margin-bottom:24px; }
    .cc-insight { display:flex; align-items:center; gap:10px; padding:12px 16px; border-radius:10px; font-size:14px; font-weight:500; }
    .cc-insight .dot { width:10px; height:10px; border-radius:50%; flex:none; }
    .cc-insight.red { background:#fdecec; color:#a31616; } .cc-insight.red .dot { background:var(--danger); }
    .cc-insight.amber { background:#fef6e7; color:#8a5a00; } .cc-insight.amber .dot { background:var(--warn); }
    .cc-insight.green { background:#e8f9ef; color:#15803d; } .cc-insight.green .dot { background:var(--success); }
    .cc-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(330px,1fr)); gap:18px; }
    .cc-col { background:var(--white); border:1px solid var(--gray-soft); border-radius:var(--radius); box-shadow:var(--shadow); padding:18px; }
    .cc-col h3 { font-size:15px; display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
    .cc-col h3 .cc-count { font-size:13px; font-weight:700; color:#fff; background:var(--navy); border-radius:100px; padding:2px 9px; }
    .cc-col.danger h3 .cc-count { background:var(--danger); }
    .cc-col.warn h3 .cc-count { background:var(--warn); }
    .cc-item { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; padding:9px 0; border-bottom:1px solid var(--gray-soft); text-decoration:none; color:var(--charcoal); }
    .cc-item:last-child { border-bottom:none; }
    .cc-item:hover { background:var(--off-white); }
    .cc-item .t { font-size:13.5px; font-weight:500; }
    .cc-item .s { font-size:12px; color:var(--muted); margin-top:1px; }
    .cc-item .badge { font-size:11px; font-weight:700; white-space:nowrap; }
    .cc-empty { color:var(--muted); font-size:13px; padding:6px 0; }
  </style>
</head>
<body>
  <div class="admin-shell">
    <div id="shell"></div>
    <main class="main">
      <div class="page-head">
        <div>
          <div class="eyebrow">Operação</div>
          <h1>Central de Comando</h1>
          <p class="muted" style="font-size:14px;margin-top:4px">O que precisa da sua atenção hoje.</p>
        </div>
        <span id="refreshSlot"></span>
      </div>
      <div class="cc-insights" id="insights"></div>
      <div class="cc-grid" id="grid"></div>
    </main>
  </div>
  <div id="modalSlot"></div>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/shell.js"></script>
  <script src="/assets/js/admin-command.js"></script>
</body>
</html>
