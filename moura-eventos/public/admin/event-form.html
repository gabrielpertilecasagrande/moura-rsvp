<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Evento — Moura One</title>
  <link rel="icon" href="/assets/img/favicon.ico" sizes="any" />
  <link rel="stylesheet" href="/assets/css/styles.css" />
  <style>
    details[open] #integrSummaryArrow { content:'▼'; transform:rotate(90deg); }
    details summary::-webkit-details-marker { display:none; }
  </style>
</head>
<body>
  <div class="admin-shell">
    <div id="shell"></div>
    <main class="main">
      <div class="page-head">
        <div>
          <div class="eyebrow" id="formEyebrow">Novo</div>
          <h1 id="formTitle">Novo Evento</h1>
        </div>
        <a href="/admin/events.html" class="btn btn-ghost">← Voltar</a>
      </div>

      <div class="card" style="max-width:680px">
        <div class="field"><label>Nome do evento *</label><input type="text" id="name" /></div>
        <div class="field"><label>Cliente / Organização</label><input type="text" id="client" /></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div class="field">
            <label>Data</label>
            <input type="date" id="event_date" />
            <div id="weekdayLabel" style="font-size:12px;color:var(--cyan);margin-top:4px;font-weight:500;min-height:16px"></div>
          </div>
          <div class="field"><label>Horário</label><input type="time" id="event_time" /></div>
        </div>
        <div class="field"><label>Local / Espaço</label><input type="text" id="location" /></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div class="field"><label>Cidade</label><input type="text" id="city" list="cityList" autocomplete="off" /><datalist id="cityList"></datalist></div>
          <div class="field"><label>Responsável</label><input type="text" id="responsible" /></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div class="field">
            <label>Tipo de evento</label>
            <select id="event_type">
              <option value="">Selecione um tipo</option>
              <option>Social</option>
              <option>Social corporativo</option>
              <option>Fórum</option>
              <option>Congresso</option>
              <option>Convenção</option>
              <option>Feira</option>
              <option>Seminário</option>
              <option>Jantar</option>
              <option>Lançamento</option>
              <option>Reunião</option>
            </select>
          </div>
          <div class="field">
            <label>Status</label>
            <select id="status">
              <option>Planejamento</option>
              <option>Contratação</option>
              <option>Produção</option>
              <option>Evento realizado</option>
              <option>Encerrado</option>
            </select>
          </div>
        </div>
        <!-- Sistemas integrados (RSVP / Check-in) -->
        <details id="integrationSection" style="margin-bottom:16px;border:1px solid var(--gray-soft);border-radius:var(--radius);padding:0">
          <summary style="padding:12px 16px;cursor:pointer;font-weight:600;font-size:14px;color:var(--navy);list-style:none;display:flex;align-items:center;gap:8px">
            <span id="integrSummaryArrow" style="font-size:12px">▶</span> Sistemas integrados (RSVP &amp; Check-in)
            <span class="muted" style="font-size:12px;font-weight:400">— opcional</span>
          </summary>
          <div style="padding:16px;border-top:1px solid var(--gray-soft)">
            <div style="color:var(--muted);font-size:13px;margin-bottom:14px">Vincule este evento aos outros sistemas. Esses IDs são fornecidos por cada plataforma ao criar o evento lá.</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
              <div class="field">
                <label>ID do evento no RSVP</label>
                <input type="text" id="rsvp_event_id" placeholder="ex: evt_abc123" />
              </div>
              <div class="field">
                <label>ID do evento no Check-in</label>
                <input type="text" id="checkin_event_id" placeholder="UUID do evento" />
              </div>
            </div>
          </div>
        </details>

        <div id="templatePreview" style="display:none;margin-bottom:16px">
          <div style="font-size:13px;font-weight:600;color:var(--navy);margin-bottom:8px">Tarefas criadas automaticamente:</div>
          <div id="templateList" style="display:flex;flex-direction:column;gap:6px"></div>
        </div>
        <div style="display:flex;gap:10px;margin-top:8px">
          <button class="btn btn-primary" id="saveBtn">Salvar evento</button>
          <a href="/admin/events.html" class="btn btn-ghost">Cancelar</a>
        </div>
      </div>
    </main>
  </div>
  <div id="modalSlot"></div>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/shell.js"></script>
  <script src="/assets/js/admin-event-form.js"></script>
</body>
</html>
