<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Clientes — Moura One</title>
  <link rel="icon" href="/assets/img/favicon.ico" sizes="any" />
  <link rel="stylesheet" href="/assets/css/styles.css" />
  <style>
    .client-card { background:var(--white); border:1px solid var(--gray-soft); border-radius:var(--radius); box-shadow:var(--shadow); margin-bottom:14px; overflow:hidden; }
    .client-top { display:flex; align-items:center; gap:14px; padding:16px 18px; cursor:pointer; }
    .client-avatar { width:42px; height:42px; border-radius:12px; background:var(--grad-destaque); color:#fff; display:flex; align-items:center; justify-content:center; font-family:var(--display); font-weight:700; font-size:16px; flex:none; }
    .client-info { flex:1; min-width:0; }
    .client-name { font-family:var(--display); font-weight:600; font-size:16px; }
    .client-sub { font-size:12.5px; color:var(--muted); margin-top:2px; }
    .client-events { border-top:1px solid var(--gray-soft); padding:6px 18px 14px; display:none; }
    .client-card.open .client-events { display:block; }
    .client-ev { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:10px 0; border-bottom:1px solid var(--gray-soft); }
    .client-ev:last-child { border-bottom:none; }
    .chev { transition:transform .2s; color:var(--muted); }
    .client-card.open .chev { transform:rotate(90deg); }
  </style>
</head>
<body>
  <div class="admin-shell">
    <div id="shell"></div>
    <main class="main">
      <div class="page-head">
        <div>
          <div class="eyebrow">Relacionamento</div>
          <h1>Clientes</h1>
        </div>
        <input type="text" id="searchInput" placeholder="Buscar cliente…" style="max-width:260px" />
      </div>
      <div id="clientList"></div>
    </main>
  </div>
  <div id="modalSlot"></div>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/shell.js"></script>
  <script src="/assets/js/admin-clients.js"></script>
</body>
</html>
