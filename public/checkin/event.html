<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#2C427E" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Check-in — Moura</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #2C427E; --navy-dark: #22335f; --navy-tint: #E8ECF5;
      --teal: #2BC2CE; --teal-tint: #E7F7F8; --teal-line: #c7e9ec;
      --base: #F2F3F3; --card: #FFFFFF; --line: #D9D9D9; --line-soft: #E6E7E7;
      --ink: #28282A; --ink-soft: #6E6F72;
      --danger: #A4343A;
      --amber: #B57614; --amber-tint: #FBF3E4;
      --shadow: 0 1px 2px rgba(40,40,42,.05), 0 4px 16px rgba(40,40,42,.07);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    body {
      background: var(--base);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      min-height: 100dvh; color: var(--ink); -webkit-font-smoothing: antialiased;
    }

    /* ── Top bar ── */
    .topbar {
      position: sticky; top: 0; z-index: 30;
      background: var(--card); border-bottom: 3px solid var(--teal);
      padding-top: env(safe-area-inset-top, 0);
    }
    .topbar-inner {
      max-width: 780px; margin: 0 auto; padding: 10px 16px;
      display: flex; align-items: center; gap: 10px;
    }
    /* Coluna central — tudo alinhado como no sistema original */
    .page { max-width: 780px; margin: 0 auto; }
    .topbar-back {
      color: var(--navy); font-size: 20px; text-decoration: none; flex-shrink: 0;
      line-height: 1; padding: 2px 4px; border-radius: 6px; transition: background .12s;
    }
    .topbar-back:hover { background: var(--navy-tint); }
    .topbar-ev { flex: 1; min-width: 0; }
    .topbar-ev-name {
      font-size: 15px; font-weight: 700; color: var(--ink);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .topbar-ev-meta { font-size: 11px; color: var(--ink-soft); margin-top: 1px; }
    .topbar-logo { height: 24px; flex-shrink: 0; }
    .topbar-logout {
      font-size: 12px; font-weight: 600; color: var(--ink-soft); cursor: pointer;
      background: none; border: none; padding: 4px 6px; border-radius: 6px;
      flex-shrink: 0; transition: color .15s;
    }
    .topbar-logout:hover { color: var(--navy); }

    /* ── Stats grid ── */
    .stats {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 1px; background: var(--line-soft);
      border: 1px solid var(--line-soft); border-radius: 14px;
      overflow: hidden; margin: 14px 14px 0;
    }
    .stat { background: var(--card); padding: 13px 10px; text-align: center; }
    .stat .n {
      font-size: 23px; font-weight: 800; letter-spacing: -.03em;
      line-height: 1; color: var(--navy);
    }
    .stat .n.ok { color: #0e7c39; }
    .stat .n.teal { color: #127a83; }
    .stat .l { font-size: 9.5px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: .06em; margin-top: 4px; font-weight: 600; }

    /* ── Toolbar ── */
    .toolbar {
      background: var(--card); border-bottom: 1px solid var(--line-soft);
      padding: 10px 14px; display: flex; gap: 8px; align-items: center;
      position: sticky; top: calc(49px + env(safe-area-inset-top, 0)); z-index: 20;
    }
    .search-wrap { flex: 1; position: relative; }
    .search-input {
      width: 100%; border: 1.5px solid var(--line-soft); border-radius: 10px;
      padding: 9px 14px 9px 34px; font-size: 14px; outline: none;
      background: var(--base); font-family: inherit; color: var(--ink);
      transition: border-color .15s, background .15s;
    }
    .search-input:focus { border-color: var(--teal); background: var(--card); }
    .search-icon {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      color: var(--ink-soft); font-size: 14px; pointer-events: none;
    }
    .btn-scan {
      background: var(--navy); color: #fff; border: none; border-radius: 10px;
      width: 42px; height: 42px; font-size: 18px; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; transition: background .15s;
    }
    .btn-scan:hover { background: var(--navy-dark); }
    .btn-scan.active { background: var(--teal); }

    /* ── Filter chips ── */
    .chips { display: flex; gap: 6px; padding: 10px 14px 8px; overflow-x: auto; }
    .chips::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0; font-size: 12px; font-weight: 600; padding: 5px 12px;
      border-radius: 99px; border: 1.5px solid var(--line); background: var(--card);
      color: var(--ink-soft); cursor: pointer; transition: all .12s; white-space: nowrap;
    }
    .chip.active { background: var(--navy); color: #fff; border-color: var(--navy); }
    .chip.active.teal { background: var(--teal); border-color: var(--teal); color: #0c3a3f; }

    /* ── Guest list ── */
    .guest-list { padding: 8px 14px 80px; }
    .guest-count { font-size: 12px; color: var(--ink-soft); padding: 4px 0 8px; font-weight: 500; }

    .list { display: flex; flex-direction: column; gap: 8px; }
    .guest {
      background: var(--card); border: 1px solid var(--line-soft); border-radius: 12px;
      padding: 13px 14px; display: flex; align-items: center; gap: 12px;
      transition: border-color .12s, background .12s;
    }
    .guest.present { background: var(--teal-tint); border-color: var(--teal-line); }

    .gi { flex: 1; min-width: 0; }
    .gname {
      font-weight: 600; font-size: 15.5px; letter-spacing: -.01em; color: var(--ink);
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .gsub { font-size: 12.5px; color: var(--ink-soft); margin-top: 3px; display: flex; gap: 10px; flex-wrap: wrap; }
    .time { font-size: 11.5px; color: #127a83; font-weight: 700; display: inline-flex; align-items: center; gap: 4px; }

    .table-chip {
      display: inline-flex; align-items: center; gap: 5px; background: var(--navy-tint);
      color: var(--navy); font-size: 12px; font-weight: 700; padding: 3px 9px;
      border-radius: 7px; cursor: pointer;
    }
    .table-chip:hover { background: #dde4f2; }
    .table-chip.none { background: #eeeeef; color: var(--ink-soft); }
    .cat-chip {
      display: inline-flex; align-items: center; font-size: 11px; font-weight: 700;
      padding: 2px 9px; border-radius: 7px; letter-spacing: .01em; cursor: pointer;
    }

    .guest-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

    /* Check-in button */
    .ck {
      flex-shrink: 0; display: inline-flex; align-items: center; gap: 6px;
      font-weight: 700; font-size: 13.5px; padding: 9px 14px;
      border-radius: 10px; border: 1.5px solid var(--navy);
      color: var(--navy); background: var(--card); cursor: pointer;
      transition: background .12s, color .12s, border-color .12s, transform .1s;
      font-family: inherit;
    }
    .ck:hover { background: var(--navy-tint); }
    .ck:active { transform: scale(.96); }
    .ck:disabled { opacity: .45; cursor: default; transform: none; }
    .ck.done { background: var(--teal); color: #0c3a3f; border-color: var(--teal); cursor: pointer; }
    .ck.done:hover { background: #25aeb9; border-color: #25aeb9; }

    /* Three-dot menu button */
    .btn-menu {
      flex-shrink: 0; width: 32px; height: 32px; border-radius: 8px; background: none; border: none;
      cursor: pointer; color: var(--ink-soft); font-size: 18px; display: inline-flex;
      align-items: center; justify-content: center; transition: background .12s;
    }
    .btn-menu:hover { background: #ededee; }

    /* ── Menu popup ── */
    .menu-pop {
      position: fixed; z-index: 60; background: var(--card);
      border: 1px solid var(--line-soft); border-radius: 11px;
      box-shadow: 0 12px 32px rgba(0,0,0,.16); overflow: hidden; min-width: 185px;
    }
    .menu-pop a, .menu-pop button {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; font-size: 13.5px; font-weight: 500; color: var(--ink);
      text-decoration: none; background: none; border: none; width: 100%; text-align: left;
      cursor: pointer; transition: background .1s; font-family: inherit;
    }
    .menu-pop a:hover, .menu-pop button:hover { background: var(--base); }
    .menu-pop .sep { height: 1px; background: var(--line-soft); margin: 2px 0; }

    /* Backdrop */
    .backdrop { position: fixed; inset: 0; z-index: 50; }

    /* ── QR Scanner overlay ── */
    .scanner-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.92); z-index: 55;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
    }
    .scanner-overlay.hidden { display: none; }
    #qrVideo { width: 100%; max-width: 340px; border-radius: 12px; object-fit: cover; }
    .scanner-frame {
      position: relative; width: 100%; max-width: 340px;
      border: 2px solid var(--teal); border-radius: 12px; overflow: hidden; aspect-ratio: 1;
    }
    .scanner-corners { position: absolute; inset: 0; pointer-events: none; }
    .scanner-corners::before, .scanner-corners::after {
      content: ''; position: absolute; width: 28px; height: 28px;
      border: 3px solid var(--teal); border-radius: 4px;
    }
    .scanner-corners::before { top: 8px; left: 8px; border-right: none; border-bottom: none; }
    .scanner-corners::after  { top: 8px; right: 8px; border-left: none; border-bottom: none; }
    .scanner-label { color: #fff; font-size: 14px; }
    .btn-close-scan {
      background: rgba(255,255,255,.1); color: #fff; border: 1px solid rgba(255,255,255,.2);
      border-radius: 14px; padding: 10px 28px; font-size: 14px; cursor: pointer;
      font-family: inherit;
    }

    /* ── Syncbar ── */
    .syncbar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 25;
      background: var(--card); border-top: 1px solid var(--line-soft);
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .syncbar-inner {
      max-width: 780px; margin: 0 auto; padding: 8px 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .sync-label { flex: 1; font-size: 11.5px; color: var(--ink-soft); }
    .sync-btn {
      font-size: 12px; font-weight: 700; color: var(--navy); background: var(--navy-tint);
      border: none; border-radius: 8px; padding: 6px 12px; cursor: pointer;
      font-family: inherit; transition: background .12s;
    }
    .sync-btn:hover { background: var(--teal-tint); }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 48px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--navy); color: #fff; padding: 12px 20px; border-radius: 11px;
      font-size: 14px; font-weight: 600; opacity: 0; pointer-events: none;
      transition: opacity .2s, transform .2s; z-index: 100; white-space: nowrap;
    }
    .toast.ok     { background: var(--navy); }
    .toast.warn   { background: #92700a; }
    .toast.err    { background: var(--danger); }
    .toast.show   { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── States ── */
    .empty-state { text-align: center; padding: 48px 20px; color: var(--ink-soft); font-size: 14px; line-height: 1.5; }
    .empty-state .icon { font-size: 36px; display: block; margin-bottom: 10px; }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--line-soft); border-top-color: var(--teal); border-radius: 50%; animation: spin .7s linear infinite; margin: 48px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Action toolbar ── */
    .actionbar {
      display: flex; gap: 8px; padding: 10px 14px 2px; overflow-x: auto;
      background: var(--card); -webkit-overflow-scrolling: touch;
    }
    .actionbar::-webkit-scrollbar { display: none; }
    .act-btn {
      flex-shrink: 0; display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 600; padding: 9px 14px; min-height: 40px;
      border-radius: 99px; border: 1.5px solid var(--line); background: var(--card);
      color: var(--navy); cursor: pointer; transition: all .12s; white-space: nowrap;
      font-family: inherit;
    }
    .act-btn:hover { background: var(--navy-tint); }
    .act-btn:active { transform: scale(.97); }
    .act-btn.filled { background: var(--navy); border-color: var(--navy); color: #fff; }
    .act-btn.filled:hover { background: var(--navy-dark); }

    /* ── Category chips ── */
    .catchips { display: flex; gap: 6px; padding: 4px 14px 8px; overflow-x: auto; }
    .catchips::-webkit-scrollbar { display: none; }
    .catchip {
      flex-shrink: 0; display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 600; padding: 5px 11px;
      border-radius: 99px; border: 1.5px solid var(--line); background: var(--card);
      color: var(--ink-soft); cursor: pointer; transition: all .12s; white-space: nowrap;
      font-family: inherit;
    }
    .catchip .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .catchip.active { background: var(--navy); color: #fff; border-color: var(--navy); }

    /* ── Guest chips (table + category) ── */
    .guest-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
    .gchip {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10.5px; font-weight: 700; padding: 2px 8px; border-radius: 99px;
      line-height: 1.5; cursor: pointer; border: 1px solid transparent;
    }
    .gchip.table { background: var(--navy-tint); color: var(--navy); }
    .gchip.addtable { background: var(--base); color: var(--ink-soft); border: 1px dashed var(--line); }
    .gchip.cat { color: #fff; }

    /* ── Modal ── */
    .modal-back {
      position: fixed; inset: 0; z-index: 70; background: rgba(40,40,42,.45);
      display: flex; align-items: flex-end; justify-content: center;
      padding: 0; opacity: 0; transition: opacity .18s;
    }
    .modal-back.show { opacity: 1; }
    @media (min-width: 540px) { .modal-back { align-items: center; padding: 20px; } }
    .modal {
      background: var(--card); width: 100%; max-width: 460px; max-height: 88vh;
      border-radius: 18px 18px 0 0; box-shadow: var(--shadow);
      display: flex; flex-direction: column; overflow: hidden;
      transform: translateY(20px); transition: transform .18s;
    }
    .modal-back.show .modal { transform: translateY(0); }
    @media (min-width: 540px) { .modal { border-radius: 18px; } }
    .modal-head {
      display: flex; align-items: center; gap: 10px; padding: 16px 18px 12px;
      border-bottom: 1px solid var(--line-soft); flex-shrink: 0;
    }
    .modal-title { flex: 1; font-size: 17px; font-weight: 800; color: var(--navy); letter-spacing: -.01em; }
    .modal-sub { font-size: 11.5px; color: var(--ink-soft); font-weight: 500; margin-top: 1px; }
    .modal-x {
      width: 32px; height: 32px; border-radius: 50%; border: none; background: var(--base);
      color: var(--ink-soft); font-size: 18px; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; transition: background .12s;
    }
    .modal-x:hover { background: var(--line-soft); }
    .modal-body { padding: 16px 18px; overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; }
    .modal-foot { padding: 12px 18px calc(14px + env(safe-area-inset-bottom,0)); border-top: 1px solid var(--line-soft); flex-shrink: 0; display: flex; gap: 8px; }

    /* form bits in modals */
    .fld { margin-bottom: 12px; }
    .fld label { display: block; font-size: 11.5px; font-weight: 700; color: var(--ink-soft); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 5px; }
    .fld input, .fld select {
      width: 100%; border: 1.5px solid var(--line-soft); border-radius: 10px;
      padding: 11px 12px; font-size: 14px; outline: none; background: var(--base);
      font-family: inherit; color: var(--ink); transition: border-color .15s;
    }
    .fld input:focus, .fld select:focus { border-color: var(--teal); background: var(--card); }
    .row2 { display: flex; gap: 8px; } .row2 > * { flex: 1; }

    .mbtn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      font-weight: 700; font-size: 14px; padding: 11px 16px; min-height: 44px;
      border-radius: 11px; border: 1.5px solid var(--navy); color: var(--navy);
      background: var(--card); cursor: pointer; font-family: inherit; transition: all .12s; flex: 1;
    }
    .mbtn:hover { background: var(--navy-tint); }
    .mbtn:active { transform: scale(.98); }
    .mbtn.primary { background: var(--navy); color: #fff; }
    .mbtn.primary:hover { background: var(--navy-dark); }
    .mbtn.teal { background: var(--teal); color: #0c3a3f; border-color: var(--teal); }
    .mbtn.teal:hover { background: #25aeb9; }
    .mbtn.ghost { border-color: var(--line); color: var(--ink-soft); }
    .mbtn.danger { border-color: var(--danger); color: var(--danger); background: var(--card); }
    .mbtn.danger:hover { background: #fbeaea; }

    /* tables grid */
    .legend { display: flex; gap: 14px; font-size: 11.5px; color: var(--ink-soft); margin-bottom: 12px; flex-wrap: wrap; }
    .legend span { display: inline-flex; align-items: center; gap: 5px; }
    .legend .sq { width: 11px; height: 11px; border-radius: 3px; }
    .tgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(96px, 1fr)); gap: 8px; }
    .tcard {
      border: 2px solid var(--line); border-radius: 12px; padding: 10px 8px; text-align: center;
      background: var(--card);
    }
    .tcard.free { border-color: #bfe3cf; background: #f3faf6; }
    .tcard.full { border-color: var(--teal-line); background: var(--teal-tint); }
    .tcard.over { border-color: var(--amber); background: var(--amber-tint); }
    .tcard .tname { font-size: 15px; font-weight: 800; color: var(--navy); }
    .tcard .tnums { font-size: 10.5px; color: var(--ink-soft); margin-top: 3px; line-height: 1.5; }
    .tcard .tpres { font-size: 10.5px; color: #127a83; font-weight: 700; margin-top: 2px; }

    /* config table rows */
    .trow { display: flex; align-items: center; gap: 7px; padding: 8px 0; border-bottom: 1px solid var(--line-soft); }
    .trow input { padding: 8px 10px; font-size: 13px; }
    .trow .tn { flex: 1.4; } .trow .tc { flex: 1; }
    .icon-btn {
      width: 38px; height: 38px; flex-shrink: 0; border-radius: 9px; border: 1.5px solid var(--line);
      background: var(--card); cursor: pointer; font-size: 15px; display: flex;
      align-items: center; justify-content: center; transition: all .12s;
    }
    .icon-btn.del { color: var(--danger); border-color: #e8c9cb; }
    .icon-btn.del:hover { background: #fbeaea; }

    /* selectable list (table/category assign) */
    .pick { display: flex; flex-direction: column; gap: 7px; margin-bottom: 12px; }
    .pick-item {
      display: flex; align-items: center; gap: 10px; padding: 11px 13px; border-radius: 11px;
      border: 1.5px solid var(--line-soft); background: var(--card); cursor: pointer;
      font-size: 14px; font-weight: 600; color: var(--ink); transition: all .12s; text-align: left; font-family: inherit;
    }
    .pick-item:hover { border-color: var(--teal); background: var(--teal-tint); }
    .pick-item.sel { border-color: var(--navy); background: var(--navy-tint); }
    .pick-item .dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }
    .pick-item .chk { margin-left: auto; color: var(--navy); font-weight: 800; }

    /* live panel */
    .live-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
    .live-box { background: var(--base); border-radius: 11px; padding: 11px 6px; text-align: center; }
    .live-box .n { font-size: 21px; font-weight: 800; color: var(--navy); line-height: 1; letter-spacing: -.02em; }
    .live-box .n.ok { color: #0e7c39; } .live-box .n.teal { color: #127a83; }
    .live-box .l { font-size: 9px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: .04em; margin-top: 4px; font-weight: 700; }
    .section-h { font-size: 12.5px; font-weight: 800; color: var(--navy); margin: 4px 0 8px; text-transform: uppercase; letter-spacing: .04em; }
    .chart { display: flex; align-items: flex-end; gap: 3px; height: 70px; padding: 0 2px; border-bottom: 1px solid var(--line-soft); margin-bottom: 16px; }
    .bar { flex: 1; background: var(--teal); border-radius: 3px 3px 0 0; min-height: 2px; transition: height .2s; }
    .recent-item { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--line-soft); }
    .recent-item .av { width: 30px; height: 30px; border-radius: 50%; background: var(--teal); color: #0c3a3f; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
    .recent-item .nm { flex: 1; font-size: 13.5px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .recent-item .tm { font-size: 11.5px; color: #127a83; font-weight: 700; }

    /* QR modal */
    .qr-card { text-align: center; }
    .qr-card canvas, .qr-card img { width: 220px; height: 220px; margin: 6px auto 10px; display: block; border-radius: 8px; }
    .qr-token { font-size: 14px; font-weight: 800; letter-spacing: .12em; color: var(--navy); word-break: break-all; margin-top: 4px; }

    .muted-note { font-size: 13px; color: var(--ink-soft); line-height: 1.5; text-align: center; padding: 10px 4px; }
    .swatches { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .swatch { width: 32px; height: 32px; border-radius: 9px; cursor: pointer; border: 2px solid transparent; }
    .swatch.sel { border-color: var(--ink); box-shadow: 0 0 0 2px #fff inset; }
    .cat-manage-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--line-soft); }
    .cat-manage-row .dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
    .cat-manage-row .nm { flex: 1; font-size: 14px; font-weight: 600; }
    .cat-manage-row .ct { font-size: 11px; color: var(--ink-soft); }
  </style>
</head>
<body>

<!-- ── Topbar ── -->
<div class="topbar">
  <div class="topbar-inner">
    <a class="topbar-back" id="backLink" href="./">‹</a>
    <div class="topbar-ev">
      <div class="topbar-ev-name" id="evName">Carregando…</div>
      <div class="topbar-ev-meta" id="evMeta"></div>
    </div>
    <img class="topbar-logo" src="logo-moura.png" alt="Moura" onerror="this.style.display='none'" />
    <button class="topbar-logout" id="logoutBtn" style="display:none" onclick="logout()">Sair</button>
  </div>
</div>

<!-- ── Conteúdo centralizado ── -->
<div class="page">

<!-- ── Stats ── -->
<div class="stats">
  <div class="stat"><div class="n" id="kpiTotal">—</div><div class="l">Total</div></div>
  <div class="stat"><div class="n ok" id="kpiPresent">—</div><div class="l">Presentes</div></div>
  <div class="stat"><div class="n" id="kpiPending">—</div><div class="l">Pendentes</div></div>
  <div class="stat"><div class="n teal" id="kpiPct">—</div><div class="l">Check-in</div></div>
</div>

<!-- ── Toolbar + chips ── -->
<div class="toolbar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" type="text" placeholder="Buscar convidado…" autocomplete="off" autocorrect="off" />
  </div>
  <button class="btn-scan" id="btnScan" title="Escanear QR Code">📷</button>
</div>
<div class="actionbar">
  <button class="act-btn" onclick="openTablesModal()">▦ Mesas</button>
  <button class="act-btn" onclick="openLiveModal()">◉ Ao vivo</button>
  <button class="act-btn" onclick="openExportMenu(event)">⬇ Exportar</button>
  <button class="act-btn" onclick="openCategoriesManager()">🏷 Categorias</button>
  <button class="act-btn filled" onclick="openReportModal()">⊕ Relatório</button>
</div>
<div class="chips">
  <button class="chip active" id="chipAll"      onclick="setFilter('all')">Todos · <span id="cntAll">0</span></button>
  <button class="chip"        id="chipPresent"  onclick="setFilter('present')">Presentes · <span id="cntPresent">0</span></button>
  <button class="chip"        id="chipPending"  onclick="setFilter('pending')">Ausentes · <span id="cntPending">0</span></button>
</div>
<div class="catchips" id="catChips" style="display:none"></div>

<!-- ── Guest list ── -->
<div class="guest-list" id="guestList">
  <div class="spinner"></div>
</div>

</div><!-- /.page -->

<!-- ── Syncbar ── -->
<div class="syncbar">
  <div class="syncbar-inner">
    <span class="sync-label" id="syncLabel">Última atualização: —</span>
    <button class="sync-btn" onclick="refreshStats()">↻ Atualizar</button>
  </div>
</div>

<!-- ── QR Scanner overlay ── -->
<div class="scanner-overlay hidden" id="scannerOverlay">
  <div class="scanner-frame">
    <video id="qrVideo" autoplay playsinline muted></video>
    <div class="scanner-corners"></div>
  </div>
  <p class="scanner-label">Aponte para o QR Code do convidado</p>
  <button class="btn-close-scan" id="btnCloseScan">Cancelar</button>
</div>

<!-- ── Modal root ── -->
<div id="modalRoot"></div>

<!-- ── Toast ── -->
<div class="toast" id="toast"></div>

<script>
const urlParams = new URLSearchParams(location.search);
const TOKEN    = urlParams.get('token') || localStorage.getItem('ci_token') || '';
const EVENT_ID = urlParams.get('event') || '';
const API      = (window.CHECKIN_API || '').replace(/\/$/, '');

if (TOKEN) localStorage.setItem('ci_token', TOKEN);

// JWT tem 3 partes separadas por ponto; operator token é hex
function isJwt(t) { return t && t.startsWith('eyJ') && t.split('.').length === 3; }

function logout() {
  localStorage.removeItem('ci_token');
  location.replace('./');
}

// Mostra botão Sair apenas para sessões JWT
if (isJwt(TOKEN)) document.getElementById('logoutBtn').style.display = '';

// Fix back link
document.getElementById('backLink').href = './?token=' + encodeURIComponent(TOKEN);

let allParticipants = [];
let stats = { total_confirmed: 0, checked_in: 0 };
let scanStream = null;
let scanning   = false;
let debounceTimer;
let activeFilter = 'all'; // 'all' | 'present' | 'pending'
let categories = [];
let tables = [];
let catFilter = ''; // '' = todas
let eventName = 'Evento';
const CAT_PALETTE = ['#B57614','#2C427E','#15795B','#7A2733','#2BC2CE','#6E6F72','#A4343A','#5B4B8A'];

// ── API helper ──────────────────────────────────────────────────────────────
function apiFetch(path, opts) {
  return fetch(API + path, {
    ...opts,
    headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json', ...(opts?.headers || {}) },
  }).then(async r => {
    const data = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(data.error || 'Erro ' + r.status);
    return data;
  });
}

function esc(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function fmtDate(d) {
  if (!d) return '';
  const [y, m, day] = d.split('-');
  return `${day}/${m}/${y}`;
}

function fmtTime(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  } catch { return ''; }
}

function initials(name) {
  return (name || '?').trim().split(/\s+/).slice(0, 2).map(n => n[0]).join('').toUpperCase();
}

// Cor de texto (preto/branco) com contraste sobre uma cor de fundo hexadecimal.
function textOn(hex) {
  try {
    const h = String(hex).replace('#', '');
    const r = parseInt(h.slice(0, 2), 16), g = parseInt(h.slice(2, 4), 16), b = parseInt(h.slice(4, 6), 16);
    return (0.299 * r + 0.587 * g + 0.114 * b) > 150 ? '#1c1c1c' : '#fff';
  } catch (e) { return '#fff'; }
}

// ── Toast ───────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ── KPIs ────────────────────────────────────────────────────────────────────
function updateKpis() {
  const c   = stats.total_confirmed;
  const p   = stats.checked_in;
  const pen = c - p;
  const pct = c > 0 ? Math.round(p / c * 100) : 0;
  document.getElementById('kpiTotal').textContent   = c;
  document.getElementById('kpiPresent').textContent = p;
  document.getElementById('kpiPending').textContent = Math.max(0, pen);
  document.getElementById('kpiPct').textContent     = pct + '%';

  // Sincbar
  const now = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  document.getElementById('syncLabel').textContent = 'Atualizado às ' + now;
}

// ── Filter chips ─────────────────────────────────────────────────────────────
function setFilter(f) {
  activeFilter = f;
  document.getElementById('chipAll').classList.toggle('active', f === 'all');
  document.getElementById('chipPresent').classList.toggle('active', f === 'present');
  document.getElementById('chipPending').classList.toggle('active', f === 'pending');
  filterList();
}

// ── Category helpers ─────────────────────────────────────────────────────────
function catById(id) {
  if (id === null || id === undefined || id === '') return null;
  return categories.find(c => String(c.id) === String(id)) || null;
}

// ── Render guest list ────────────────────────────────────────────────────────
function renderList(list) {
  const el = document.getElementById('guestList');
  if (!list.length) {
    el.innerHTML = `<div class="empty-state"><span class="icon">🔍</span>Nenhum convidado encontrado.</div>`;
    return;
  }
  el.innerHTML = `<div class="guest-count">${list.length} convidado${list.length !== 1 ? 's' : ''}</div>` +
    '<div class="list">' +
    list.map(p => {
      const done = !!p.checked_in_at;
      const cat = catById(p.category_id);
      const tableChip = p.table_number
        ? `<span class="table-chip" onclick="openTableAssign(${p.id})">⬡ Mesa ${esc(p.table_number)}</span>`
        : `<span class="table-chip none" onclick="openTableAssign(${p.id})">+ mesa</span>`;
      const catChip = cat
        ? `<span class="cat-chip" style="background:${esc(cat.color || '#6E6F72')};color:${textOn(cat.color || '#6E6F72')}" onclick="openCategoryAssign(${p.id})">${esc(cat.name)}</span>`
        : '';
      const sub = [];
      if (p.company) sub.push(`<span>${esc(p.company)}</span>`);
      if (p.phone)   sub.push(`<span>${esc(p.phone)}</span>`);
      if (done)      sub.push(`<span class="time">✓ ${fmtTime(p.checked_in_at)}</span>`);
      return `
        <div class="guest${done ? ' present' : ''}" id="gc-${p.id}">
          <div class="gi">
            <div class="gname">${esc(p.name)}${catChip}${tableChip}</div>
            ${sub.length ? `<div class="gsub">${sub.join('')}</div>` : ''}
          </div>
          <div class="guest-actions">
            ${done
              ? `<button class="ck done" onclick="undoCheckin(${p.id})" title="Toque para desfazer o check-in">✓ Presente</button>`
              : `<button class="ck" onclick="registerCheckin(${p.id})">Check-in</button>`}
            <button class="btn-menu" onclick="openRowMenu(event, ${p.id})" title="Mais opções">⋮</button>
          </div>
        </div>`;
    }).join('') +
    '</div>';
}

function filterList() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
  let list = allParticipants;
  if (activeFilter === 'present') list = list.filter(p => !!p.checked_in_at);
  if (activeFilter === 'pending') list = list.filter(p => !p.checked_in_at);
  if (catFilter !== '') list = list.filter(p => String(p.category_id || '') === String(catFilter));
  if (q) list = list.filter(p => (p.name || '').toLowerCase().includes(q));
  updateChipCounts();
  renderList(list);
}

// Atualiza as contagens nos chips de filtro (Todos · N).
function updateChipCounts() {
  const total = allParticipants.length;
  const present = allParticipants.filter(p => !!p.checked_in_at).length;
  const setTxt = (id, n) => { const e = document.getElementById(id); if (e) e.textContent = n; };
  setTxt('cntAll', total);
  setTxt('cntPresent', present);
  setTxt('cntPending', Math.max(0, total - present));
}

// ── Category chip row ────────────────────────────────────────────────────────
function renderCatChips() {
  const el = document.getElementById('catChips');
  if (!categories.length) { el.style.display = 'none'; el.innerHTML = ''; return; }
  el.style.display = 'flex';
  // counts from participants
  const counts = {};
  allParticipants.forEach(p => { if (p.category_id != null && p.category_id !== '') counts[p.category_id] = (counts[p.category_id] || 0) + 1; });
  el.innerHTML =
    `<button class="catchip${catFilter === '' ? ' active' : ''}" onclick="setCatFilter('')">Todas categorias</button>` +
    categories.map(c => `
      <button class="catchip${String(catFilter) === String(c.id) ? ' active' : ''}" onclick="setCatFilter('${c.id}')">
        <span class="dot" style="background:${esc(c.color || '#6E6F72')}"></span>${esc(c.name)} ${counts[c.id] || 0}
      </button>`).join('');
}

function setCatFilter(id) {
  catFilter = id;
  renderCatChips();
  filterList();
}

// ── Row three-dot menu ───────────────────────────────────────────────────────
function closeRowMenu() {
  document.querySelectorAll('.menu-pop, .row-backdrop').forEach(e => e.remove());
}
function openRowMenu(ev, pid) {
  ev.stopPropagation();
  closeRowMenu();
  const back = document.createElement('div');
  back.className = 'backdrop row-backdrop';
  back.onclick = closeRowMenu;
  document.body.appendChild(back);

  const pop = document.createElement('div');
  pop.className = 'menu-pop';
  pop.innerHTML = `
    <button onclick="closeRowMenu();openQrModal(${pid})">🔳 Ver QR Code</button>
    <button onclick="closeRowMenu();openTableAssign(${pid})">▦ Definir / trocar mesa</button>
    <button onclick="closeRowMenu();openCategoryAssign(${pid})">🏷 Definir categoria</button>`;
  document.body.appendChild(pop);

  const r = ev.currentTarget.getBoundingClientRect();
  const w = 185;
  let left = r.right - w;
  if (left < 8) left = 8;
  let top = r.bottom + 4;
  const ph = pop.offsetHeight;
  if (top + ph > window.innerHeight - 8) top = r.top - ph - 4;
  pop.style.left = left + 'px';
  pop.style.top = Math.max(8, top) + 'px';
}

// ── Check-in ─────────────────────────────────────────────────────────────────
async function registerCheckin(participantId) {
  const btn = document.querySelector(`#gc-${participantId} .ck`);
  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  try {
    const r = await apiFetch('/api/checkin/register', { method: 'POST', body: JSON.stringify({ participant_id: participantId }) });
    const p = allParticipants.find(x => x.id === participantId);
    if (p) {
      p.checked_in_at = r.checked_in_at;
      if (r.already_checked_in) {
        showToast('Já havia chegado — ' + fmtTime(r.checked_in_at), 'warn');
      } else {
        stats.checked_in++;
        updateKpis();
        showToast('✓ Chegada registrada — ' + esc(r.name), 'ok');
        playBeep(true);
      }
    }
    filterList();
  } catch (e) {
    showToast(e.message, 'err');
    playBeep(false);
    if (btn) { btn.disabled = false; btn.textContent = 'Check-in'; }
  }
}

// ── Desfazer check-in ────────────────────────────────────────────────────────
async function undoCheckin(participantId) {
  const p = allParticipants.find(x => x.id === participantId);
  if (!p) return;
  if (!confirm(`Desfazer o check-in de ${p.name}?`)) return;
  const btn = document.querySelector(`#gc-${participantId} .ck`);
  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  try {
    const r = await apiFetch('/api/checkin/unregister', { method: 'POST', body: JSON.stringify({ participant_id: participantId }) });
    p.checked_in_at = null;
    if (r.was_checked_in) {
      stats.checked_in = Math.max(0, stats.checked_in - 1);
      updateKpis();
      showToast('Check-in desfeito — ' + esc(r.name), 'warn');
    }
    filterList();
  } catch (e) {
    showToast(e.message, 'err');
    if (btn) { btn.disabled = false; btn.textContent = '✓ Presente'; }
    filterList();
  }
}

// ── QR Scanner ───────────────────────────────────────────────────────────────
async function handleQrResult(token) {
  if (!scanning) return;
  scanning = false;
  stopScan();
  try {
    const p = await apiFetch('/api/checkin/lookup?qr=' + encodeURIComponent(token));
    // Update local list
    const local = allParticipants.find(x => x.id === p.id);
    if (p.checked_in_at && local) {
      showToast('Já havia chegado — ' + esc(p.name), 'warn');
      playBeep(false);
    } else {
      await registerCheckin(p.id);
    }
  } catch (e) {
    showToast(e.message, 'err');
    playBeep(false);
    scanning = true;
  }
}

function stopScan() {
  if (scanStream) { scanStream.getTracks().forEach(t => t.stop()); scanStream = null; }
  document.getElementById('scannerOverlay').classList.add('hidden');
  document.getElementById('btnScan').classList.remove('active');
}

async function startScan() {
  const overlay = document.getElementById('scannerOverlay');
  const video   = document.getElementById('qrVideo');
  overlay.classList.remove('hidden');
  document.getElementById('btnScan').classList.add('active');
  scanning = true;
  try {
    scanStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    video.srcObject = scanStream;
    await video.play();

    if ('BarcodeDetector' in window) {
      const bd = new BarcodeDetector({ formats: ['qr_code'] });
      const tick = async () => {
        if (!scanning) return;
        try {
          const codes = await bd.detect(video);
          if (codes.length) { await handleQrResult(codes[0].rawValue); return; }
        } catch { /* sem código ainda */ }
        requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
    } else {
      showToast('QR automático não suportado — use a câmera e busque o nome.', 'warn');
    }
  } catch (e) {
    stopScan();
    showToast('Câmera não disponível: ' + e.message, 'err');
  }
}

document.getElementById('btnScan').addEventListener('click', () => {
  if (scanStream) { stopScan(); scanning = false; } else { startScan(); }
});
document.getElementById('btnCloseScan').addEventListener('click', () => { scanning = false; stopScan(); });

// ── Audio feedback ────────────────────────────────────────────────────────────
function playBeep(success) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = success ? 880 : 220;
    gain.gain.setValueAtTime(.4, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + (success ? .25 : .5));
    osc.start(); osc.stop(ctx.currentTime + (success ? .25 : .5));
  } catch { /* sem áudio */ }
}

// ── Refresh stats ─────────────────────────────────────────────────────────────
async function refreshStats() {
  try {
    stats = await apiFetch('/api/checkin/events/' + EVENT_ID + '/stats');
    updateKpis();
  } catch { /* ignora */ }
}

// ── Search ────────────────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(filterList, 250);
});

// ── Generic modal ────────────────────────────────────────────────────────────
let modalCloseHook = null;
function openModal(html, onClose) {
  closeModal();
  modalCloseHook = onClose || null;
  const root = document.getElementById('modalRoot');
  const back = document.createElement('div');
  back.className = 'modal-back';
  back.innerHTML = `<div class="modal" onclick="event.stopPropagation()">${html}</div>`;
  back.addEventListener('click', closeModal);
  root.appendChild(back);
  requestAnimationFrame(() => back.classList.add('show'));
  return back;
}
function closeModal() {
  if (modalCloseHook) { try { modalCloseHook(); } catch {} modalCloseHook = null; }
  const root = document.getElementById('modalRoot');
  if (root) root.innerHTML = '';
}
function modalShell(title, sub, bodyHtml, footHtml) {
  return `
    <div class="modal-head">
      <div style="flex:1;min-width:0">
        <div class="modal-title">${title}</div>
        ${sub ? `<div class="modal-sub">${sub}</div>` : ''}
      </div>
      <button class="modal-x" onclick="closeModal()" aria-label="Fechar">×</button>
    </div>
    <div class="modal-body">${bodyHtml}</div>
    ${footHtml ? `<div class="modal-foot">${footHtml}</div>` : ''}`;
}

// ── Data loading: categories + tables ────────────────────────────────────────
async function loadCategories() {
  try { categories = await apiFetch('/api/checkin/events/' + EVENT_ID + '/categories') || []; }
  catch { categories = []; }
}
async function loadTables() {
  try { tables = await apiFetch('/api/checkin/events/' + EVENT_ID + '/tables') || []; }
  catch { tables = []; }
}

// ── Export menu (Excel + CSV) ────────────────────────────────────────────────
function exportRows() {
  return allParticipants.map(p => {
    const cat = catById(p.category_id);
    return {
      Nome: p.name || '',
      Empresa: p.company || '',
      Mesa: p.table_number || '',
      Categoria: cat ? cat.name : '',
      Status: p.checked_in_at ? 'Presente' : 'Ausente',
      Hora: p.checked_in_at ? fmtTime(p.checked_in_at) : '',
    };
  });
}
function safeFileBase() { return (eventName || 'evento').replace(/[^\w\-]+/g, '-').toLowerCase(); }

function exportExcel() {
  try {
    const ws = XLSX.utils.json_to_sheet(exportRows());
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Check-in');
    XLSX.writeFile(wb, safeFileBase() + '-checkin.xlsx');
    showToast('Excel gerado', 'ok');
  } catch (e) { showToast('Erro ao gerar Excel', 'err'); }
}
function exportCSV() {
  try {
    const rows = exportRows();
    const cols = ['Nome','Empresa','Mesa','Categoria','Status','Hora'];
    const esc2 = v => `"${String(v).replace(/"/g, '""')}"`;
    const csv = [cols.join(',')].concat(rows.map(r => cols.map(c => esc2(r[c])).join(','))).join('\r\n');
    const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = safeFileBase() + '-checkin.csv';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 500);
    showToast('CSV gerado', 'ok');
  } catch (e) { showToast('Erro ao gerar CSV', 'err'); }
}
function openExportMenu(ev) {
  ev.stopPropagation();
  closeRowMenu();
  const back = document.createElement('div');
  back.className = 'backdrop row-backdrop';
  back.onclick = closeRowMenu;
  document.body.appendChild(back);
  const pop = document.createElement('div');
  pop.className = 'menu-pop';
  pop.innerHTML = `
    <button onclick="closeRowMenu();exportExcel()">⬇ Excel (.xlsx)</button>
    <button onclick="closeRowMenu();exportCSV()">⬇ CSV (.csv)</button>`;
  document.body.appendChild(pop);
  const r = ev.currentTarget.getBoundingClientRect();
  let left = r.left; if (left + 185 > window.innerWidth - 8) left = window.innerWidth - 193;

  pop.style.top = (r.bottom + 4) + 'px';
}

function renderMesasBody() {
  const body = document.getElementById('mesasBody');

  } else {
    grid = `<div class="tgrid">` + tables.map(t => {
      const cap = t.capacity || 0;
      const alloc = t.allocated || 0;
      let cls = 'free';
      if (cap && alloc > cap) cls = 'over';
      else if (cap && alloc >= cap) cls = 'full';
      else if (cap && alloc > 0) cls = 'full';
      const capTxt = cap ? `${alloc}/${cap}` : `${alloc} aloc.`;
      return `<div class="tcard ${cls}">

// ── Ao vivo (Live) modal ─────────────────────────────────────────────────────
let liveInterval = null;
function openLiveModal() {
  openModal(modalShell('Painel ao vivo', 'Atualiza automaticamente',
    `<div id="liveBody"></div>`, ''), () => { if (liveInterval) { clearInterval(liveInterval); liveInterval = null; } });
  renderLiveBody();
  liveInterval = setInterval(async () => {
    try {
      const [s, parts] = await Promise.all([
        apiFetch('/api/checkin/events/' + EVENT_ID + '/stats'),
        apiFetch('/api/checkin/events/' + EVENT_ID + '/participants'),
      ]);
      stats = s; allParticipants = parts;
      updateKpis(); renderLiveBody();
    } catch {}
  }, 4000);
}
function renderLiveBody() {
  const body = document.getElementById('liveBody');
  if (!body) return;
  const total = stats.total_confirmed || 0;
  const present = stats.checked_in || 0;
  const absent = Math.max(0, total - present);
  const pct = total > 0 ? Math.round(present / total * 100) : 0;

  // per-minute buckets (last 20 min)
  const now = Date.now();
  const buckets = new Array(20).fill(0);
  allParticipants.forEach(p => {
    if (!p.checked_in_at) return;
    const t = new Date(p.checked_in_at).getTime();
    if (isNaN(t)) return;
    const diffMin = Math.floor((now - t) / 60000);
    if (diffMin >= 0 && diffMin < 20) buckets[19 - diffMin]++;
  });
  const maxB = Math.max(1, ...buckets);
  const bars = buckets.map(v => `<div class="bar" style="height:${Math.round(v / maxB * 100)}%" title="${v} check-in(s)"></div>`).join('');

  const recent = allParticipants.filter(p => p.checked_in_at)
    .sort((a, b) => new Date(b.checked_in_at) - new Date(a.checked_in_at))
    .slice(0, 10);
  const recentHtml = recent.length
    ? recent.map(p => `<div class="recent-item"><div class="av">${esc(initials(p.name))}</div><div class="nm">${esc(p.name)}</div><div class="tm">${fmtTime(p.checked_in_at)}</div></div>`).join('')
    : `<div class="muted-note">Nenhum check-in ainda.</div>`;

  body.innerHTML = `
    <div class="live-grid">
      <div class="live-box"><div class="n">${total}</div><div class="l">Convidados</div></div>
      <div class="live-box"><div class="n ok">${present}</div><div class="l">Presentes</div></div>
      <div class="live-box"><div class="n">${absent}</div><div class="l">Ausentes</div></div>
      <div class="live-box"><div class="n teal">${pct}%</div><div class="l">Comparec.</div></div>
    </div>
    <div class="section-h">Check-ins por minuto (últimos 20 min)</div>
    <div class="chart">${bars}</div>
    <div class="section-h">Últimos check-ins</div>
    ${recentHtml}`;
}

    <canvas id="qrCanvas"></canvas>
    <div style="font-weight:800;font-size:16px;color:var(--ink)">${esc(p.name)}</div>
    ${meta ? `<div style="font-size:12.5px;color:var(--ink-soft);margin-top:2px">${esc(meta)}</div>` : ''}
    <div class="qr-token">${esc(tokenDisp)}</div>
  </div>`;
  const foot = `<button class="mbtn primary" onclick="printQr(${pid})">🖨 Imprimir</button>`;
  openModal(modalShell('QR Code', '', body, foot));
  if (window.QRCode) {
    QRCode.toCanvas(document.getElementById('qrCanvas'), p.qr_token, { width: 220, margin: 1 }, err => { if (err) console.error(err); });
  }
}
function printQr(pid) {
  const p = allParticipants.find(x => x.id === pid);
  if (!p || !p.qr_token) return;
  QRCode.toDataURL(p.qr_token, { width: 320, margin: 1 }, (err, url) => {
    if (err) { showToast('Erro ao gerar QR', 'err'); return; }
    const w = window.open('', '_blank');
    if (!w) { showToast('Permita pop-ups para imprimir', 'warn'); return; }
    const meta = [p.company, p.role].filter(Boolean).join(' · ');
    w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>QR — ${esc(p.name)}</title>
      <style>body{font-family:Arial,sans-serif;text-align:center;padding:40px;color:#28282A}
      img{width:300px;height:300px}h2{color:#2C427E;margin:14px 0 2px}p{color:#666;margin:0}
      .tok{margin-top:10px;font-weight:800;letter-spacing:.1em;color:#2C427E}</style></head><body>
      <img src="${url}"><h2>${esc(p.name)}</h2><p>${esc(meta)}</p>
      <div class="tok">${esc(String(p.qr_token).toUpperCase())}</div></body></html>`);
    w.document.close();
    setTimeout(() => { w.focus(); w.print(); }, 300);
  });
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  if (!TOKEN || !EVENT_ID) {
    document.getElementById('guestList').innerHTML = `<div class="empty-state"><span class="icon">🔒</span>Link inválido. Solicite um novo ao organizador.</div>`;
    return;
  }
  try {
    const [evList, s] = await Promise.all([
      apiFetch('/api/checkin/events'),
      apiFetch('/api/checkin/events/' + EVENT_ID + '/stats'),
    ]);
    const ev = evList.find(e => String(e.id) === String(EVENT_ID));
    if (ev) {
      eventName = ev.name;
      document.getElementById('evName').textContent = ev.name;
      const meta = [fmtDate(ev.event_date), ev.location, ev.city].filter(Boolean).join(' · ');
      document.getElementById('evMeta').textContent = meta;
      document.title = ev.name + ' — Check-in';
    }
    stats = s;
    updateKpis();

    allParticipants = await apiFetch('/api/checkin/events/' + EVENT_ID + '/participants');
    filterList();

    // Carrega categorias e mesas (falhas não bloqueiam)
    await Promise.all([loadCategories(), loadTables()]);
    renderCatChips();
    filterList();

    // Refresh stats every 30 seconds
    setInterval(async () => {
      try {
        stats = await apiFetch('/api/checkin/events/' + EVENT_ID + '/stats');
        updateKpis();
      } catch { /* ignora */ }
    }, 30000);
  } catch (e) {
    document.getElementById('guestList').innerHTML =
      `<div class="empty-state"><span class="icon">⚠️</span>${esc(e.message)}</div>`;
  }
}

init();
</script>
