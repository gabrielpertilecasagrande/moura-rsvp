<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#2C427E" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Check-in — Moura</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #2C427E; --navy-dark: #22335f; --navy-tint: #E8ECF5;
      --teal: #2BC2CE; --teal-tint: #E7F7F8; --teal-line: #c7e9ec;
      --base: #F2F3F3; --card: #FFFFFF; --line: #D9D9D9; --line-soft: #E6E7E7;
      --ink: #28282A; --ink-soft: #6E6F72;
      --amber: #B57614; --amber-tint: #FBF3E4;
      --danger: #A4343A;
      --shadow: 0 1px 2px rgba(40,40,42,.05), 0 4px 16px rgba(40,40,42,.07);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    body {
      background: var(--base);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      min-height: 100dvh;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Top bar ── */
    .topbar {
      position: sticky; top: 0; z-index: 30;
      background: var(--card);
      border-bottom: 3px solid var(--teal);
      padding-top: env(safe-area-inset-top, 0);
    }
    .topbar-inner {
      max-width: 780px; margin: 0 auto; padding: 10px 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .topbar-logo { height: 26px; flex-shrink: 0; }
    .topbar-appname {
      font-size: 11px; font-weight: 700; letter-spacing: .12em; color: var(--navy);
      text-transform: uppercase; border-left: 1px solid var(--line); padding-left: 12px;
    }
    .topbar-spacer { flex: 1; }
    .pill {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 600; padding: 4px 10px;
      border-radius: 99px; letter-spacing: .02em;
    }
    .pill::before { content: ''; width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .pill.ok { background: var(--teal-tint); color: #127a83; }
    .pill.ok::before { background: var(--teal); }
    .pill.off { background: #f5f5f5; color: var(--ink-soft); }
    .pill.off::before { background: #aaa; }
    .userbtn {
      width: 34px; height: 34px; border-radius: 50%; background: var(--navy);
      color: #fff; font-weight: 700; font-size: 13px; border: none; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .operator-badge {
      font-size: 11px; font-weight: 700; background: var(--navy-tint); color: var(--navy);
      border-radius: 99px; padding: 4px 10px; letter-spacing: .04em;
    }
    .logout-link {
      font-size: 12px; font-weight: 600; color: var(--ink-soft); cursor: pointer;
      background: none; border: none; padding: 4px 6px; border-radius: 6px;
      transition: color .15s;
    }
    .logout-link:hover { color: var(--navy); }

    /* ── Page wrapper ── */
    .page { max-width: 780px; margin: 0 auto; padding: 18px 16px 80px; }
    .page-head { margin-bottom: 20px; }
    .page-title { font-size: 26px; font-weight: 800; letter-spacing: -.03em; color: var(--navy); }
    .page-sub { font-size: 13px; color: var(--ink-soft); margin-top: 4px; }

    /* ── Skeleton ── */
    .skel-card { background: var(--card); border: 1px solid var(--line-soft); border-left: 4px solid var(--line-soft); border-radius: 14px; padding: 18px; margin-bottom: 12px; box-shadow: var(--shadow); }
    .skel { background: linear-gradient(90deg, #eef0f2 25%, #e3e6e9 50%, #eef0f2 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 8px; }
    @keyframes shimmer { to { background-position: -200% 0; } }
    .skel-row { display: flex; gap: 14px; margin-bottom: 14px; align-items: flex-start; }
    .skel-icon { width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0; }
    .skel-lines { flex: 1; }
    .skel-line { height: 13px; margin-bottom: 8px; border-radius: 6px; }
    .skel-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
    .skel-stat { height: 42px; border-radius: 10px; }

    /* ── Event card ── */
    .ev-card {
      background: var(--card); border: 1px solid var(--line-soft);
      border-left: 4px solid var(--navy); border-radius: 14px;
      padding: 18px; box-shadow: var(--shadow); cursor: pointer;
      transition: transform .12s, border-color .12s, box-shadow .12s;
      display: flex; align-items: center; gap: 16px;
      text-decoration: none; color: inherit; margin-bottom: 12px;
    }
    .ev-card:hover { transform: translateY(-1px); border-color: #c9cacb; border-left-color: var(--teal); box-shadow: 0 4px 20px rgba(40,40,42,.12); }
    .ev-card:active { transform: translateY(0); }

    .ev-body { flex: 1; min-width: 0; }
    .ev-name { font-size: 17px; font-weight: 700; color: var(--ink); line-height: 1.25; letter-spacing: -.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ev-meta { font-size: 12.5px; color: var(--ink-soft); margin-top: 5px; display: flex; align-items: center; gap: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ev-counts { display: flex; align-items: center; gap: 14px; flex-shrink: 0; text-align: right; }
    .ev-pct { font-size: 22px; font-weight: 800; color: var(--navy); letter-spacing: -.03em; line-height: 1; }
    .ev-pct-label { font-size: 9.5px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: .06em; margin-top: 2px; }
    .ev-detail { display: flex; flex-direction: column; align-items: flex-end; }
    .ev-checked { font-size: 13px; font-weight: 700; color: var(--teal); }
    .ev-total { font-size: 11.5px; color: var(--ink-soft); margin-top: 1px; }
    .ev-arrow { color: #c2c6cf; font-size: 20px; flex-shrink: 0; transition: color .12s; }
    .ev-card:hover .ev-arrow { color: var(--teal); }

    /* ── State boxes ── */
    .state-box { text-align: center; padding: 64px 24px; }
    .state-box .icon { font-size: 44px; margin-bottom: 14px; }
    .state-box p { color: var(--ink-soft); font-size: 14px; line-height: 1.5; }
    .state-box .err { color: var(--danger); font-weight: 700; font-size: 16px; margin-bottom: 6px; }
    .state-box .hdg { font-size: 17px; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--line-soft); border-top-color: var(--teal); border-radius: 50%; animation: spin .7s linear infinite; margin: 70px auto 0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer { text-align: center; font-size: 11px; color: var(--ink-soft); margin-top: 36px; opacity: .7; }

    /* ── Login form ── */
    .login-wrap { display: flex; justify-content: center; padding: 40px 16px 80px; }
    .auth-card {
      background: var(--card); border: 1px solid var(--line-soft); border-radius: 18px;
      box-shadow: var(--shadow); width: 100%; max-width: 400px; padding: 30px 26px;
    }
    .auth-logo { display: block; height: 28px; margin: 0 auto 20px; }
    .auth-title { font-size: 20px; font-weight: 800; color: var(--navy); text-align: center; letter-spacing: -.02em; margin-bottom: 5px; }
    .auth-sub { font-size: 13px; color: var(--ink-soft); text-align: center; margin-bottom: 24px; line-height: 1.5; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
    .field input {
      width: 100%; border: 1.5px solid var(--line); border-radius: 10px;
      padding: 11px 14px; font-size: 15px; font-family: inherit; outline: none;
      background: #fafbfc; transition: border-color .15s, box-shadow .15s; color: var(--ink);
    }
    .field input:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(43,194,206,.14); background: #fff; }
    .auth-btn {
      width: 100%; padding: 13px; background: var(--navy); color: #fff;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
      cursor: pointer; margin-top: 8px; letter-spacing: .01em;
      transition: background .15s, transform .1s;
    }
    .auth-btn:hover { background: var(--navy-dark); }
    .auth-btn:active { transform: scale(.98); }
    .auth-btn:disabled { opacity: .55; cursor: not-allowed; }
    .auth-err { font-size: 13px; color: var(--danger); text-align: center; margin-top: 12px; min-height: 18px; font-weight: 500; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--navy); color: #fff; padding: 12px 20px; border-radius: 11px;
      font-size: 14px; font-weight: 600; opacity: 0; pointer-events: none;
      transition: opacity .2s, transform .2s; z-index: 100; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- ── Topbar ── -->
<div class="topbar">
  <div class="topbar-inner">
    <img class="topbar-logo" src="logo-moura.png" alt="Moura" onerror="this.style.display='none'" />
    <span class="topbar-appname">Check-in</span>
    <div class="topbar-spacer"></div>
    <span class="pill ok" id="connPill">Online</span>
    <span class="operator-badge" id="operatorLabel" style="display:none">Operador</span>
    <button class="userbtn" id="userBtn" style="display:none" title="Usuário" onclick="logout()">–</button>
    <button class="logout-link" id="logoutBtn" style="display:none" onclick="logout()">Sair</button>
  </div>
</div>

<!-- ── Content ── -->
<div class="page" id="root">
  <div class="spinner"></div>
</div>

<!-- ── Toast ── -->
<div class="toast" id="toast"></div>

<script>
  const params = new URLSearchParams(location.search);
  let TOKEN = params.get('token') || localStorage.getItem('ci_token') || '';
  const API = (window.CHECKIN_API || '').replace(/\/$/, '');

  if (TOKEN) localStorage.setItem('ci_token', TOKEN);

  // JWT tem 3 partes separadas por ponto e começa com "eyJ"; operator token é hex
  function isJwt(t) { return t && t.startsWith('eyJ') && t.split('.').length === 3; }

  function apiFetch(path, opts, tok) {
    const t = tok || TOKEN;
    return fetch(API + path, {
      ...opts,
      headers: { 'Authorization': 'Bearer ' + t, 'Content-Type': 'application/json', ...(opts?.headers || {}) },
    }).then(async r => {
      const data = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(data.error || 'Erro ' + r.status);
      return data;
    });
  }

  const MESES = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
  function fmtDate(d) {
    if (!d) return '';
    const [y, m, day] = d.split('-');
    return `${day}/${m}/${y}`;
  }

  function pct(a, b) { return b > 0 ? Math.round(a / b * 100) : 0; }

  function logout() {
    localStorage.removeItem('ci_token');
    location.replace('./');
  }

  function esc(s) { return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  // Iniciais para o botão de usuário
  function getInitial(jwt) {
    try {
      const payload = JSON.parse(atob(jwt.split('.')[1]));
      return (payload.name || payload.email || '?')[0].toUpperCase();
    } catch { return '?'; }
  }

  // Conexão
  function updateConn() {
    const pill = document.getElementById('connPill');
    if (navigator.onLine) {
      pill.className = 'pill ok'; pill.textContent = 'Online';
    } else {
      pill.className = 'pill off'; pill.textContent = 'Offline';
    }
  }
  window.addEventListener('online',  updateConn);
  window.addEventListener('offline', updateConn);
  updateConn();

  // Toast
  let toastTimer;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
  }

  function skeleton(n) {
    let s = '';
    for (let i = 0; i < n; i++) {
      s += `<div class="skel-card">
        <div class="skel-row">
          <div class="skel skel-icon"></div>
          <div class="skel-lines" style="flex:1">
            <div class="skel skel-line" style="width:65%"></div>
            <div class="skel skel-line" style="width:40%;margin-bottom:0"></div>
          </div>
        </div>
        <div class="skel-stats">
          <div class="skel skel-stat"></div>
          <div class="skel skel-stat"></div>
          <div class="skel skel-stat"></div>
        </div>
      </div>`;
    }
    return s;
  }

  function showLoginForm(errMsg) {
    document.getElementById('logoutBtn').style.display = 'none';
    document.getElementById('userBtn').style.display = 'none';
    document.getElementById('operatorLabel').style.display = 'none';
    document.getElementById('root').innerHTML = `
      <div class="login-wrap">
        <div class="auth-card">
          <img class="auth-logo" src="logo-moura.png" alt="Moura" onerror="this.style.display='none'" />
          <div class="auth-title">Bem-vindo ao Check-in</div>
          <div class="auth-sub">Entre com seu e-mail e senha do Moura One</div>
          <div class="field">
            <label for="loginEmail">E-mail</label>
            <input type="email" id="loginEmail" placeholder="seu@email.com" autocomplete="email" />
          </div>
          <div class="field">
            <label for="loginPass">Senha</label>
            <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password" />
          </div>
          <button class="auth-btn" id="loginBtn">Entrar</button>
          <div class="auth-err" id="loginErr">${errMsg ? esc(errMsg) : ''}</div>
        </div>
      </div>`;

    const emailEl = document.getElementById('loginEmail');
    const passEl  = document.getElementById('loginPass');
    const btn     = document.getElementById('loginBtn');
    const errEl   = document.getElementById('loginErr');

    async function doLogin() {
      const email    = emailEl.value.trim();
      const password = passEl.value;
      if (!email || !password) { errEl.textContent = 'Preencha e-mail e senha.'; return; }
      btn.disabled = true; btn.textContent = 'Entrando…'; errEl.textContent = '';
      try {
        const data = await apiFetch('/api/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email, password }),
        }, '');
        TOKEN = data.token;
        localStorage.setItem('ci_token', TOKEN);
        loadEvents();
      } catch (e) {
        errEl.textContent = e.message === 'Credenciais inválidas.' ? 'E-mail ou senha incorretos.' : e.message;
        btn.disabled = false; btn.textContent = 'Entrar';
      }
    }

    btn.addEventListener('click', doLogin);
    passEl.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    emailEl.addEventListener('keydown', e => { if (e.key === 'Enter') passEl.focus(); });
  }

  async function loadEvents() {
    const root = document.getElementById('root');
    if (!TOKEN) { showLoginForm(); return; }

    // Atualiza topbar de acordo com o tipo de token
    const logoutBtn    = document.getElementById('logoutBtn');
    const userBtn      = document.getElementById('userBtn');
    const operatorBadge = document.getElementById('operatorLabel');

    if (isJwt(TOKEN)) {
      userBtn.textContent = getInitial(TOKEN);
      userBtn.style.display = '';
      logoutBtn.style.display = '';
      operatorBadge.style.display = 'none';
    } else {
      userBtn.style.display = 'none';
      logoutBtn.style.display = 'none';
      operatorBadge.style.display = '';
    }

    root.innerHTML = `<div class="page-head"><h1 class="page-title">Eventos</h1></div>` + skeleton(3);

    try {
      const events = await apiFetch('/api/checkin/events');
      if (events.length === 1) {
        location.replace('event?token=' + encodeURIComponent(TOKEN) + '&event=' + events[0].id);
        return;
      }
      if (!events.length) {
        root.innerHTML = `
          <div class="page-head"><h1 class="page-title">Eventos</h1></div>
          <div class="state-box">
            <div class="icon">📭</div>
            <p class="hdg">Nenhum evento disponível</p>
            <p>Quando houver um evento com convidados confirmados, ele aparecerá aqui.</p>
          </div>`;
        return;
      }

      const statsAll = await Promise.all(
        events.map(ev => apiFetch('/api/checkin/events/' + ev.id + '/stats').catch(() => ({ total_confirmed: 0, checked_in: 0 })))
      );

      root.innerHTML = `
        <div class="page-head">
          <h1 class="page-title">Eventos</h1>
          <p class="page-sub">${events.length} evento${events.length !== 1 ? 's' : ''} disponível${events.length !== 1 ? 'is' : ''}</p>
        </div>
        ${events.map((ev, i) => {
          const s = statsAll[i];
          const p = pct(s.checked_in, s.total_confirmed);
          const metaParts = [ev.location, ev.city].filter(Boolean);
          const metaDate  = ev.event_date ? fmtDate(ev.event_date) : '';
          const metaStr   = metaParts.length ? metaParts.join(' · ') : metaDate;
          return `
            <a class="ev-card" href="event?token=${encodeURIComponent(TOKEN)}&event=${ev.id}">
              <div class="ev-body">
                <div class="ev-name">${esc(ev.name)}</div>
                ${metaStr ? `<div class="ev-meta">📍 ${esc(metaStr)}${metaDate && metaParts.length ? ' · ' + esc(metaDate) : ''}</div>` : ''}
              </div>
              <div class="ev-counts">
                <div class="ev-detail">
                  <div class="ev-checked">${s.checked_in} presentes</div>
                  <div class="ev-total">${s.total_confirmed} confirmados</div>
                </div>
                <div>
                  <div class="ev-pct">${p}%</div>
                  <div class="ev-pct-label">Check-in</div>
                </div>
              </div>
              <div class="ev-arrow">›</div>
            </a>`;
        }).join('')}
        <div class="footer">Moura Agência de Relações Públicas · 2026</div>`;
    } catch (e) {
      // Token expirado ou inválido → volta para o login
      if (e.message.includes('401') || e.message.toLowerCase().includes('expirado') || e.message.toLowerCase().includes('inválido')) {
        localStorage.removeItem('ci_token');
        TOKEN = '';
        showLoginForm('Sua sessão expirou. Faça login novamente.');
        return;
      }
      root.innerHTML = `
        <div class="state-box">
          <div class="icon">⚠️</div>
          <p class="err">${esc(e.message)}</p>
          <p>Verifique sua conexão e tente novamente.</p>
        </div>`;
    }
  }

  loadEvents();
</script>
</body>
</html>
