<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#2C427E" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Check-in — Moura</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #2C427E; --navy-deep: #21345f; --cyan: #2BC2CE;
      --off-white: #F2F3F3; --gray-soft: #eceded; --charcoal: #28282A;
      --muted: #6b6f78; --ok: #22c55e; --danger: #ef4444; --white: #fff;
      --radius: 14px; --radius-sm: 9px;
      --shadow: 0 1px 2px rgba(40,40,42,.06), 0 8px 24px rgba(40,40,42,.06);
    }
    body { background: var(--off-white); font-family: 'Inter', system-ui, sans-serif; min-height: 100dvh; }
    .topbar {
      background: var(--navy); color: #fff; padding: 0 20px;
      display: flex; align-items: center; gap: 14px; height: 56px;
      position: sticky; top: 0; z-index: 20;
    }
    .topbar-logo { height: 28px; }
    .topbar-title { font-size: 15px; font-weight: 700; letter-spacing: .02em; flex: 1; }
    .topbar-badge {
      font-size: 10px; font-weight: 700; background: rgba(255,255,255,.12);
      border-radius: 99px; padding: 3px 10px; color: #9fb0d8;
    }
    .topbar-logout {
      font-size: 12px; font-weight: 600; color: rgba(255,255,255,.7);
      background: none; border: none; cursor: pointer; padding: 4px 8px;
      border-radius: 6px; transition: background .15s;
    }
    .topbar-logout:hover { background: rgba(255,255,255,.12); color: #fff; }
    .page { max-width: 520px; margin: 0 auto; padding: 24px 16px 80px; }
    .page-title { font-size: 22px; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
    .page-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
    .event-card {
      background: var(--white); border-radius: var(--radius); padding: 18px 20px;
      margin-bottom: 12px; box-shadow: var(--shadow); cursor: pointer;
      border: 1.5px solid transparent; transition: border-color .15s, box-shadow .15s;
      text-decoration: none; color: inherit; display: block;
    }
    .event-card:hover { border-color: var(--cyan); box-shadow: 0 4px 20px rgba(44,66,126,.1); }
    .event-card:active { transform: scale(.99); }
    .event-name { font-size: 16px; font-weight: 700; color: var(--charcoal); margin-bottom: 4px; }
    .event-meta { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
    .event-stats { display: flex; gap: 16px; }
    .stat { display: flex; flex-direction: column; align-items: center; background: var(--off-white); border-radius: 8px; padding: 8px 14px; }
    .stat-n { font-size: 20px; font-weight: 800; color: var(--navy); line-height: 1; }
    .stat-n.ok { color: var(--ok); }
    .stat-l { font-size: 10px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: .04em; }
    .state-box { text-align: center; padding: 60px 20px; }
    .state-box .icon { font-size: 40px; margin-bottom: 12px; }
    .state-box p { color: var(--muted); font-size: 14px; }
    .state-box .err { color: var(--danger); font-weight: 600; font-size: 15px; margin-bottom: 6px; }
    .spinner {
      width: 36px; height: 36px; border: 3px solid var(--gray-soft);
      border-top-color: var(--cyan); border-radius: 50%;
      animation: spin .7s linear infinite; margin: 60px auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer { text-align: center; font-size: 11px; color: var(--muted); margin-top: 32px; }
    .pct-bar { height: 4px; border-radius: 2px; background: var(--gray-soft); margin-top: 8px; overflow: hidden; }
    .pct-fill { height: 100%; background: var(--ok); border-radius: 2px; transition: width .4s; }

    /* Login form */
    .login-wrap {
      max-width: 360px; margin: 48px auto 0; padding: 0 16px;
    }
    .login-card {
      background: var(--white); border-radius: var(--radius); padding: 32px 28px;
      box-shadow: var(--shadow);
    }
    .login-logo { display: block; height: 36px; margin: 0 auto 24px; }
    .login-title { font-size: 20px; font-weight: 700; color: var(--navy); text-align: center; margin-bottom: 6px; }
    .login-sub { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 24px; }
    .login-field { margin-bottom: 14px; }
    .login-field label { display: block; font-size: 12px; font-weight: 600; color: var(--charcoal); margin-bottom: 6px; }
    .login-field input {
      width: 100%; border: 1.5px solid #d4d6da; border-radius: var(--radius-sm);
      padding: 11px 14px; font-size: 15px; font-family: inherit; outline: none;
      transition: border-color .15s;
    }
    .login-field input:focus { border-color: var(--cyan); }
    .login-btn {
      width: 100%; padding: 13px; background: var(--navy); color: #fff;
      border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 700;
      cursor: pointer; margin-top: 6px; transition: background .15s;
    }
    .login-btn:hover { background: var(--navy-deep); }
    .login-btn:disabled { opacity: .6; cursor: not-allowed; }
    .login-err {
      font-size: 13px; color: var(--danger); text-align: center;
      margin-top: 12px; min-height: 18px;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <img class="topbar-logo" src="/assets/img/logo-moura-white.png" alt="Moura" onerror="this.style.display='none'" />
    <div class="topbar-title">Check-in de Eventos</div>
    <span class="topbar-badge" id="operatorLabel" style="display:none">Operador</span>
    <button class="topbar-logout" id="logoutBtn" style="display:none" onclick="logout()">Sair</button>
  </div>
  <div class="page" id="root">
    <div class="spinner"></div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    let TOKEN = params.get('token') || localStorage.getItem('ci_token') || '';
    const API = (window.CHECKIN_API || '').replace(/\/$/, '');

    if (TOKEN) localStorage.setItem('ci_token', TOKEN);

    // JWT tem 3 partes separadas por ponto e começa com "eyJ"; operator token é hex
    function isJwt(t) { return t && t.startsWith('eyJ') && t.split('.').length === 3; }

    function apiFetch(path, opts, tok) {
      const t = tok || TOKEN;
      return fetch(API + path, {
        ...opts,
        headers: { 'Authorization': 'Bearer ' + t, 'Content-Type': 'application/json', ...(opts?.headers || {}) },
      }).then(async r => {
        const data = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(data.error || 'Erro ' + r.status);
        return data;
      });
    }

    function fmtDate(d) {
      if (!d) return '';
      const [y, m, day] = d.split('-');
      return `${day}/${m}/${y}`;
    }

    function pct(a, b) { return b > 0 ? Math.round(a / b * 100) : 0; }

    function logout() {
      localStorage.removeItem('ci_token');
      location.replace('./');
    }

    function showLoginForm(errMsg) {
      document.getElementById('logoutBtn').style.display = 'none';
      document.getElementById('operatorLabel').style.display = 'none';
      document.getElementById('root').innerHTML = `
        <div class="login-wrap">
          <div class="login-card">
            <img class="login-logo" src="/assets/img/logo-moura-navy.png" alt="Moura" onerror="this.style.display='none'" />
            <div class="login-title">Bem-vinda ao Check-in</div>
            <div class="login-sub">Entre com seu e-mail e senha do Moura One</div>
            <div class="login-field">
              <label for="loginEmail">E-mail</label>
              <input type="email" id="loginEmail" placeholder="seu@email.com" autocomplete="email" />
            </div>
            <div class="login-field">
              <label for="loginPass">Senha</label>
              <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password" />
            </div>
            <button class="login-btn" id="loginBtn">Entrar</button>
            <div class="login-err" id="loginErr">${errMsg ? esc(errMsg) : ''}</div>
          </div>
        </div>`;

      const emailEl = document.getElementById('loginEmail');
      const passEl  = document.getElementById('loginPass');
      const btn     = document.getElementById('loginBtn');
      const errEl   = document.getElementById('loginErr');

      async function doLogin() {
        const email    = emailEl.value.trim();
        const password = passEl.value;
        if (!email || !password) { errEl.textContent = 'Preencha e-mail e senha.'; return; }
        btn.disabled = true; btn.textContent = 'Entrando…'; errEl.textContent = '';
        try {
          const data = await apiFetch('/api/auth/login', {
            method: 'POST',
            body: JSON.stringify({ email, password }),
          }, '');
          TOKEN = data.token;
          localStorage.setItem('ci_token', TOKEN);
          loadEvents();
        } catch (e) {
          errEl.textContent = e.message === 'Credenciais inválidas.' ? 'E-mail ou senha incorretos.' : e.message;
          btn.disabled = false; btn.textContent = 'Entrar';
        }
      }

      btn.addEventListener('click', doLogin);
      passEl.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
      emailEl.addEventListener('keydown', e => { if (e.key === 'Enter') passEl.focus(); });
    }

    async function loadEvents() {
      const root = document.getElementById('root');
      if (!TOKEN) { showLoginForm(); return; }

      // Mostra botão de sair apenas para sessões JWT (não para operator token)
      const logoutBtn    = document.getElementById('logoutBtn');
      const operatorBadge = document.getElementById('operatorLabel');
      if (isJwt(TOKEN)) {
        logoutBtn.style.display = '';
        operatorBadge.style.display = 'none';
      } else {
        logoutBtn.style.display = 'none';
        operatorBadge.style.display = '';
      }

      root.innerHTML = '<div class="spinner"></div>';
      try {
        const events = await apiFetch('/api/checkin/events');
        if (events.length === 1) {
          location.replace('event?token=' + encodeURIComponent(TOKEN) + '&event=' + events[0].id);
          return;
        }
        const statsAll = await Promise.all(events.map(ev => apiFetch('/api/checkin/events/' + ev.id + '/stats').catch(() => ({ total_confirmed: 0, checked_in: 0 }))));
        root.innerHTML = `
          <h1 class="page-title">Eventos</h1>
          <p class="page-sub">${events.length} evento${events.length !== 1 ? 's' : ''} disponível${events.length !== 1 ? 'is' : ''}</p>
          ${events.map((ev, i) => {
            const s = statsAll[i];
            const p = pct(s.checked_in, s.total_confirmed);
            const meta = [fmtDate(ev.event_date), ev.location, ev.city].filter(Boolean).join(' · ');
            return `
              <a class="event-card" href="event?token=${encodeURIComponent(TOKEN)}&event=${ev.id}">
                <div class="event-name">${esc(ev.name)}</div>
                ${meta ? `<div class="event-meta">${esc(meta)}</div>` : ''}
                <div class="event-stats">
                  <div class="stat"><span class="stat-n">${s.total_confirmed}</span><span class="stat-l">Confirmados</span></div>
                  <div class="stat"><span class="stat-n ok">${s.checked_in}</span><span class="stat-l">Presentes</span></div>
                  <div class="stat"><span class="stat-n">${p}%</span><span class="stat-l">Check-in</span></div>
                </div>
                <div class="pct-bar"><div class="pct-fill" style="width:${p}%"></div></div>
              </a>`;
          }).join('')}
          <div class="footer">Moura Agência de Relações Públicas · 2026</div>`;
      } catch (e) {
        // Token expirado ou inválido → volta para o login
        if (e.message.includes('401') || e.message.toLowerCase().includes('expirado') || e.message.toLowerCase().includes('inválido')) {
          localStorage.removeItem('ci_token');
          TOKEN = '';
          showLoginForm('Sua sessão expirou. Faça login novamente.');
          return;
        }
        root.innerHTML = `<div class="state-box"><div class="icon">⚠️</div><p class="err">${esc(e.message)}</p><p>Verifique sua conexão e tente novamente.</p></div>`;
      }
    }

    function esc(s) { return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    loadEvents();
  </script>
</body>
</html>
