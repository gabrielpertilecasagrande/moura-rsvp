/* ============ HISTÓRICO / AUDITORIA ============ */
function activityPhrase(en){
  const who=`<b>${esc(en.actor||'—')}</b>`;
  const a=en.action, d=esc(en.details||en.participant_name||'');
  if(a==='checkin')      return `${who} realizou check-in de <b>${esc(en.participant_name||'')}</b>`;
  if(a==='uncheckin')    return `${who} <span style="color:var(--danger)">desfez o check-in</span> de <b>${esc(en.participant_name||'')}</b>`;
  if(a==='guest_add'||a==='participant_add')    return `${who} adicionou o convidado <b>${d||esc(en.participant_name||'')}</b>`;
  if(a==='guest_remove'||a==='participant_remove') return `${who} <span style="color:var(--danger)">removeu o convidado</span> <b>${d||esc(en.participant_name||'')}</b>`;
  if(a==='guest_edit'||a==='participant_edit')   return `${who} editou o convidado <b>${d||esc(en.participant_name||'')}</b>`;
  if(a==='table_change') return `${who} alterou a mesa — ${d}`;
  if(a==='cat_create')   return `${who} criou a categoria <b>${d}</b>`;
  if(a==='cat_delete')   return `${who} <span style="color:var(--danger)">excluiu a categoria</span> <b>${d}</b>`;
  if(a==='import')       return `${who} importou lista — ${d}`;
  return `${who} · ${esc(a)} ${d}`;
}
function actIcon(a){
  const m={checkin:'✓',uncheckin:'↩',guest_add:'＋',participant_add:'＋',guest_remove:'✕',participant_remove:'✕',guest_edit:'✎',participant_edit:'✎',table_change:'⬡',cat_create:'◆',cat_delete:'◇',import:'⇪'};
  return m[a]||'•';
}
async function modalGuestHistory(gid){
  const g=state.guests.find(x=>String(x.id)===String(gid));
  modalRoot().innerHTML=shell('Histórico — '+esc(g?g.name:''),`<div id="histBody" style="font-size:14px;color:var(--ink-soft)">Carregando...</div>`);
  let resp=null;
  try{ resp=await apiFetch('/api/checkin/participant/'+gid+'/history'); }catch(e){}
  const part=(resp&&resp.participant)||{};
  const logArr=(resp&&resp.log)||[];
  const head=`<div class="hist-card">
    <div class="hr"><span>Convidado</span><b>${esc(g?g.name:(part.name||'—'))}</b></div>
    ${g&&g.company?`<div class="hr"><span>Empresa</span><b>${esc(g.company)}</b></div>`:''}
    ${state.current.has_tables?`<div class="hr"><span>Mesa</span><b>${esc((g&&g.table_number)||'—')}</b></div>`:''}
    <div class="hr"><span>Cadastrado</span><b>${part.created_at?fmtDateTime(part.created_at):'—'}</b></div>
    <div class="hr"><span>Check-in</span><b>${g&&g.check_in_time?fmtDateTime(g.check_in_time):'<span style=\"color:var(--ink-soft);font-weight:400\">ainda não</span>'}</b></div>
    ${g&&g.notes?`<div class="hr"><span>Observações</span><b>${esc(g.notes)}</b></div>`:''}
  </div>`;
  let tl='';
  if(!logArr.length){ tl='<div style="color:var(--ink-soft);margin-top:12px">Nenhuma alteração registrada.</div>'; }
  else{
    const items=logArr.slice().sort((x,y)=>String(y.created_at).localeCompare(String(x.created_at)));
    tl='<div class="rep-section"><h4>Linha do tempo</h4><div class="feed">'+items.map(en=>`<div class="fi"><span class="fic">${actIcon(en.action)}</span><span class="ft">${activityPhrase(en)}</span><span class="time">${fmtDateTime(en.created_at)}</span></div>`).join('')+'</div></div>';
  }
  const hb=$('#histBody'); if(hb) hb.innerHTML=head+tl;
}
async function modalEventHistory(){
  modalRoot().innerHTML=shell('Registro de atividades',`<div id="ehBody" style="font-size:14px;color:var(--ink-soft)">Carregando...</div>`);
  let items=[];
  try{ items=await apiFetch('/api/checkin/events/'+state.current.id+'/activity'); }catch(e){}
  const eh=$('#ehBody'); if(!eh) return;
  if(!items.length){ eh.innerHTML='<div style="color:var(--ink-soft)">Nenhuma atividade registrada ainda.</div>'; return; }
  items=items.slice().sort((a,b)=>String(b.created_at).localeCompare(String(a.created_at)));
  eh.innerHTML=`<div style="font-size:12.5px;color:var(--ink-soft);margin-bottom:10px">${items.length} registros (mais recentes primeiro)</div><div class="feed">`+items.map(en=>`<div class="fi"><span class="fic">${actIcon(en.action)}</span><span class="ft">${activityPhrase(en)}</span><span class="time">${fmtDateTime(en.created_at)}</span></div>`).join('')+`</div>`;
}

function modalImport(){
  modalRoot().innerHTML=shell('Importar lista',`
    <button class="tmpl-btn" onclick="downloadTemplate()"><span>⬇ Baixar modelo de planilha (.xlsx)</span><span style="opacity:.7">gabarito</span></button>
    <div class="import-help">Aceita <b>.xlsx</b> e <b>.csv</b>. As colunas são detectadas automaticamente. Use cabeçalhos como <b>Nome</b>, <b>Mesa</b>, <b>Empresa</b>, <b>Telefone</b> — o modelo acima já vem pronto.</div>
    <div class="filedrop" onclick="$('#fileIn').click()"><div style="font-size:30px;margin-bottom:6px">⇪</div><div>Toque para escolher a planilha preenchida</div></div>
    <input type="file" id="fileIn" accept=".xlsx,.xls,.csv" style="display:none" onchange="if(this.files[0])handleFile(this.files[0])">
    <div id="importPreview"></div>`);
}
function renderImportPreview(rows,cols){
  const show=rows.slice(0,5);
  let t=`<table class="preview-tbl"><tr><th>Nome</th>${cols.table?'<th>Mesa</th>':''}${cols.category?'<th>Categoria</th>':''}${cols.company?'<th>Empresa</th>':''}</tr>`;
  show.forEach(r=>{ t+=`<tr><td>${esc(r.name)}</td>${cols.table?'<td>'+esc(r.table)+'</td>':''}${cols.category?'<td>'+esc(r.categoryName||'')+(r.categoryName&&!r.category_id?' <span style="color:var(--danger)">(?)</span>':'')+'</td>':''}${cols.company?'<td>'+esc(r.company)+'</td>':''}</tr>`; });
  t+=`</table>`;
  const warn=cols.category&&rows.some(r=>r.categoryName&&!r.category_id)?'<div style="font-size:12px;color:var(--danger);margin-top:6px">Itens com (?) têm categoria que não existe no evento — serão importados sem categoria. Crie a categoria antes, se necessário.</div>':'';
  $('#importPreview').innerHTML=`<div style="margin-top:14px;font-weight:600;font-size:14px">${rows.length} convidados detectados</div>${t}${warn}${rows.length>5?'<div style="font-size:12px;color:var(--ink-soft);margin-top:4px">...e mais '+(rows.length-5)+'</div>':''}<button class="btn btn-primary btn-block" style="margin-top:14px" onclick="confirmImport()">Importar ${rows.length} convidados</button>`;
}

function modalExport(){
  modalRoot().innerHTML=shell('Exportar',`
    <button class="btn btn-ghost btn-block" style="margin-bottom:10px;justify-content:space-between" onclick="exportList()">Lista completa de convidados <span style="color:var(--ink-soft)">.xlsx ⇩</span></button>
    <button class="btn btn-ghost btn-block" style="margin-bottom:10px;justify-content:space-between" onclick="exportReportXlsx()">Relatório completo <span style="color:var(--ink-soft)">.xlsx ⇩</span></button>
    <button class="btn btn-ghost btn-block" style="justify-content:space-between" onclick="exportQRBadges()">Crachás com QR Code <span style="color:var(--ink-soft)">.pdf ⇩</span></button>`);
}

function modalReport(){
  const ev=state.current,s=computeStats(),G=live(state.guests);
  const byTable={}; if(ev.has_tables){ G.forEach(g=>{const t=g.table_number||'Sem mesa';(byTable[t]=byTable[t]||[]).push(g);}); }
  let tablesHtml='';
  if(ev.has_tables&&Object.keys(byTable).length){
    tablesHtml=`<div class="rep-section"><h4>Por mesa</h4>`+Object.keys(byTable).sort((a,b)=>a.localeCompare(b,undefined,{numeric:true})).map(t=>{
      const arr=byTable[t]; const p=arr.filter(g=>g.checked_in).length;
      return `<div class="table-grp"><div class="tg-head"><span>Mesa ${esc(t)}</span><span>${p}/${arr.length}</span></div><div class="tg-body">${arr.map(g=>esc(g.name)+(g.checked_in?' ✓':'')).join(' · ')}</div></div>`;
    }).join('')+`</div>`;
  }
  const recent=G.filter(g=>g.checked_in).sort((a,b)=>String(b.check_in_time||'').localeCompare(String(a.check_in_time||''))).slice(0,8);
  const recentHtml=recent.length?`<div class="rep-section"><h4>Últimos check-ins</h4><div class="rep-list">${recent.map(g=>`<div class="ri"><span>${esc(g.name)}${ev.has_tables&&g.table_number?' · Mesa '+esc(g.table_number):''}</span><span class="time">${fmtTime(g.check_in_time)}</span></div>`).join('')}</div></div>`:'';
  let catHtml='';
  if(ev.use_categories&&state.categories.length){
    const rows=state.categories.map(c=>{ const arr=G.filter(g=>String(g.category_id)===String(c.id)); const p=arr.filter(g=>g.checked_in).length; return {c,t:arr.length,p}; }).filter(x=>x.t>0);
    const semCat=G.filter(g=>!g.category_id); if(semCat.length) rows.push({c:{name:'Sem categoria',color:'#bcbcbc'},t:semCat.length,p:semCat.filter(g=>g.checked_in).length});
    if(rows.length) catHtml=`<div class="rep-section"><h4>Por categoria</h4>`+rows.map(x=>`<div class="table-grp"><div class="tg-head" style="background:${esc(x.c.color)}22;color:${esc(x.c.color)}"><span>${esc(x.c.name)}</span><span>${x.p}/${x.t} · ${x.t?Math.round(x.p/x.t*100):0}%</span></div></div>`).join('')+`</div>`;
  }
  modalRoot().innerHTML=shell('Relatório — '+esc(ev.name),`
    <div class="rep-sum">
      <div class="rep-box"><div class="n tnum">${s.total}</div><div class="l">Total</div></div>
      <div class="rep-box"><div class="n tnum" style="color:#149aa5">${s.present}</div><div class="l">Presentes</div></div>
      <div class="rep-box"><div class="n tnum">${s.pct}%</div><div class="l">Comparec.</div></div></div>
    ${recentHtml}${catHtml}${tablesHtml}
    <button class="btn btn-ghost btn-block" style="margin-top:14px" onclick="modalEventHistory()">📋 Registro de atividades (quem fez o quê)</button>
    <div class="export-row">
      <button class="btn btn-primary" onclick="exportReportPDF()">⬇ PDF</button>
      <button class="btn btn-ghost" onclick="exportReportXlsx()">⬇ Excel</button>
      <button class="btn btn-ghost" onclick="printReport()">🖶 Imprimir</button>
    </div>`);
}

/* ============ INIT ============ */
function preloadLogo(){
  try{ const img=new Image(); img.onload=()=>{ try{ const c=document.createElement('canvas'); c.width=img.naturalWidth; c.height=img.naturalHeight; c.getContext('2d').drawImage(img,0,0); LOGO_DATA={data:c.toDataURL('image/png'),w:img.naturalWidth,h:img.naturalHeight}; }catch(e){} }; img.src='logo-moura.png'; }catch(e){}
}
preloadLogo();
initApp();
setInterval(updateConn,5000);
</script>
