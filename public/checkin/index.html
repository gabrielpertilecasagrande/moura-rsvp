<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#2C427E">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Moura · Check-in</title>
  <link rel="icon" href="/assets/img/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/img/favicon-16.png" />
  <link rel="apple-touch-icon" href="/assets/img/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{
    --navy:#2C427E; --navy-dark:#22335f; --navy-tint:#E8ECF5;
    --teal:#2BC2CE; --teal-tint:#E7F7F8; --teal-line:#c7e9ec;
    --base:#F2F3F3; --card:#FFFFFF; --line:#D9D9D9; --line-soft:#E6E7E7;
    --ink:#28282A; --ink-soft:#6E6F72;
    --amber:#B57614; --amber-tint:#FBF3E4;
    --danger:#A4343A;
    --shadow:0 1px 2px rgba(40,40,42,.05),0 4px 16px rgba(40,40,42,.07);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--base);color:var(--ink);-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,select{font-family:inherit;font-size:16px}
  .tnum{font-variant-numeric:tabular-nums}

  /* ===== Topbar ===== */
  .topbar{position:sticky;top:0;z-index:30;background:#fff;border-bottom:3px solid var(--teal);padding:10px 16px;display:flex;align-items:center;gap:12px}
  .topbar img{height:26px;display:block}
  .topbar .appname{font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--navy);text-transform:uppercase;border-left:1px solid var(--line);padding-left:12px}
  .top-right{margin-left:auto;display:flex;align-items:center;gap:8px}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;padding:5px 11px;border-radius:999px;letter-spacing:.02em}
  .pill .d{width:7px;height:7px;border-radius:50%}
  .pill.ok{background:var(--teal-tint);color:#127a83}.pill.ok .d{background:var(--teal)}
  .pill.off{background:#ededee;color:var(--ink-soft)}.pill.off .d{background:#a9a9ad}
  .pill.pend{background:var(--amber-tint);color:var(--amber)}.pill.pend .d{background:var(--amber)}
  .userbtn{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;background:var(--navy);color:#fff;font-weight:700;font-size:13px}
  .back{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:9px;background:var(--navy-tint);color:var(--navy);font-size:18px;font-weight:700}

  .wrap{max-width:780px;margin:0 auto;padding:18px}

  /* ===== Buttons ===== */
  .btn{display:inline-flex;align-items:center;gap:7px;font-weight:600;font-size:14px;padding:10px 15px;border-radius:10px;transition:.12s;white-space:nowrap}
  .btn-primary{background:var(--navy);color:#fff}
  .btn-primary:hover{background:var(--navy-dark)}
  .btn-teal{background:var(--teal);color:#0c3a3f}
  .btn-ghost{background:var(--card);color:var(--ink);border:1px solid var(--line)}
  .btn-ghost:hover{border-color:#bfc0c0;background:#fafafa}
  .btn-sm{padding:7px 11px;font-size:13px}
  .btn-block{width:100%;justify-content:center}

  /* ===== Auth ===== */
  .auth-wrap{min-height:calc(100vh - 60px);display:flex;align-items:center;justify-content:center;padding:20px}
  .auth-card{background:var(--card);border:1px solid var(--line-soft);border-radius:18px;box-shadow:var(--shadow);width:100%;max-width:400px;padding:30px 26px}
  .auth-card .logo{display:block;margin:0 auto 6px;height:34px}
  .auth-card .tag{text-align:center;color:var(--ink-soft);font-size:12.5px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;margin-bottom:22px}
  .tabs{display:flex;background:var(--base);border-radius:10px;padding:4px;margin-bottom:18px}
  .tabs button{flex:1;padding:9px;border-radius:8px;font-weight:700;font-size:13.5px;color:var(--ink-soft)}
  .tabs button.on{background:#fff;color:var(--navy);box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .auth-err{background:#FBEAEA;color:var(--danger);font-size:13px;padding:10px 12px;border-radius:9px;margin-bottom:12px;display:none}
  .auth-note{font-size:12px;color:var(--ink-soft);text-align:center;margin-top:14px;line-height:1.5}

  /* ===== Home / cards ===== */
  .home-head{display:flex;align-items:flex-end;justify-content:space-between;margin:6px 0 18px;gap:10px;flex-wrap:wrap}
  .home-head h1{font-size:26px;font-weight:800;letter-spacing:-.03em;color:var(--navy)}
  .home-head p{color:var(--ink-soft);font-size:14px;margin-top:3px}
  .ev-grid{display:flex;flex-direction:column;gap:12px}
  .ev-card{background:var(--card);border:1px solid var(--line-soft);border-left:4px solid var(--navy);border-radius:14px;padding:18px;box-shadow:var(--shadow);cursor:pointer;transition:.12s;display:flex;align-items:center;gap:16px}
  .ev-card:hover{transform:translateY(-1px);border-color:#c9cacb;border-left-color:var(--teal)}
  .ev-card .ev-main{flex:1;min-width:0}
  .ev-card h3{font-size:17px;font-weight:700;letter-spacing:-.02em;margin-bottom:4px;color:var(--ink)}
  .ev-card .meta{color:var(--ink-soft);font-size:13px;display:flex;flex-wrap:wrap;gap:4px 14px}
  .ev-card .ring{flex-shrink:0;text-align:center}
  .ev-card .ring .pct{font-size:22px;font-weight:800;letter-spacing:-.03em;color:var(--navy)}
  .ev-card .ring .lbl{font-size:10px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.06em}
  .empty{text-align:center;padding:60px 20px;color:var(--ink-soft)}
  .empty .big{font-size:46px;margin-bottom:10px}

  /* ===== Event view ===== */
  .ev-title{margin:4px 0 14px}
  .ev-title h2{font-size:23px;font-weight:800;letter-spacing:-.03em;line-height:1.15;color:var(--navy)}
  .ev-title .meta{color:var(--ink-soft);font-size:13.5px;margin-top:5px;display:flex;flex-wrap:wrap;align-items:center;gap:3px 14px}

  .syncbar{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line-soft);border-radius:11px;padding:9px 12px;margin-bottom:14px;font-size:12.5px;flex-wrap:wrap}
  .syncbar .upd{color:var(--ink-soft)}
  .syncbar .refresh{display:inline-flex;align-items:center;gap:5px;color:var(--navy);font-weight:700;border:1px solid var(--line);border-radius:8px;padding:6px 11px;margin-left:auto}
  .syncbar .refresh:hover{background:var(--navy-tint)}
  .syncbar .refresh.spin span{display:inline-block;animation:rot .8s linear infinite}
  @keyframes rot{to{transform:rotate(360deg)}}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line-soft);border:1px solid var(--line-soft);border-radius:14px;overflow:hidden;margin-bottom:16px}
  .stat{background:var(--card);padding:13px 10px;text-align:center}
  .stat .n{font-size:23px;font-weight:800;letter-spacing:-.03em;line-height:1;color:var(--navy)}
  .stat.hl .n{color:#149aa5}
  .stat .l{font-size:10.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.06em;margin-top:5px}

  .toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .search{flex:1;min-width:180px;position:relative}
  .search input{width:100%;padding:11px 13px 11px 38px;border:1px solid var(--line);border-radius:10px;background:var(--card)}
  .search input:focus{outline:2px solid var(--navy);outline-offset:-1px;border-color:transparent}
  .search .ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink-soft)}
  .search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:26px;height:26px;border-radius:50%;font-size:18px;color:var(--ink-soft);background:#ededee;display:flex;align-items:center;justify-content:center}
  .search-clear:hover{background:#e0e0e1;color:var(--ink)}
  mark{background:#FFE9A8;color:inherit;border-radius:3px;padding:0 1px}
  .cat-chip{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:2px 9px;border-radius:7px;letter-spacing:.01em}
  .cat-filters{margin-top:-6px}
  .cat-f .cat-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
  .cat-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #efefef}
  .cat-row .cat-sw{width:18px;height:18px;border-radius:6px;flex-shrink:0}
  .cat-row .cat-name{flex:1;font-weight:600;font-size:14px}
  .cat-mini{width:30px;height:30px;border-radius:8px;font-size:13px;color:var(--ink-soft);background:#f2f2f2}
  .cat-mini:hover{background:#e6e6e6;color:var(--ink)}
  .cat-mini.danger:hover{background:#FBEAEA;color:var(--danger)}
  .color-row{display:flex;flex-wrap:wrap;gap:8px}
  .color-pick{width:30px;height:30px;border-radius:8px;cursor:pointer;border:3px solid transparent;transition:.1s}
  .color-pick.on{border-color:var(--ink);transform:scale(1.08)}
  /* Mapa de mesas avançado */
  .ob-banner{background:#FBEAEA;color:var(--danger);border:1px solid #f0c4c4;border-radius:10px;padding:10px 13px;font-size:13px;font-weight:700;margin-bottom:14px}
  .ob-banner.clickable{cursor:pointer}.ob-banner.clickable:hover{background:#f8dede}
  .map-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .map-kpi{background:#fafafa;border:1px solid var(--line-soft);border-radius:10px;padding:7px 12px;font-size:12px;color:var(--ink-soft)}
  .map-kpi b{display:block;font-size:17px;color:var(--navy);font-weight:800}
  .map-legend{display:flex;gap:14px;font-size:12px;color:var(--ink-soft);margin-bottom:12px;flex-wrap:wrap}
  .lg{display:inline-block;width:11px;height:11px;border-radius:3px;vertical-align:middle;margin-right:3px}
  .lg.occ{background:#A4343A}.lg.free{background:#15795B}.lg.over{background:#7A2733;outline:2px solid #ffcf33}
  .mesa-grid2{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
  .mesa-card2{border:1px solid var(--line);border-radius:12px;padding:12px;cursor:pointer;transition:.12s;background:#fff}
  .mesa-card2:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
  .mesa-card2 .mc-head{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:6px}
  .mesa-card2 .mc-name{font-weight:700;font-size:13.5px;color:var(--navy)}
  .mesa-card2 .mc-alert{font-size:8.5px;font-weight:800;background:var(--danger);color:#fff;padding:2px 5px;border-radius:5px;letter-spacing:.03em}
  .mesa-card2 .mc-occ{font-size:20px;font-weight:800;letter-spacing:-.02em;color:var(--ink)}
  .mesa-card2 .mc-occ span{font-size:12px;color:var(--ink-soft);font-weight:600}
  .mesa-card2 .mc-occ.over{color:var(--danger)}
  .mesa-card2 .seats{display:flex;flex-wrap:wrap;gap:3px;margin:8px 0 6px}
  .seat{width:11px;height:11px;border-radius:3px}
  .seat.free{background:#15795B}
  .seat.occ{background:#A4343A}
  .seat.over{background:#7A2733;outline:2px solid #ffcf33;outline-offset:-1px}
  .seat-more{font-size:10px;color:var(--ink-soft);align-self:center;margin-left:2px}
  .mesa-card2 .mc-na{font-size:11px;color:var(--ink-soft);font-style:italic;margin:8px 0 6px}
  .mesa-card2 .mc-foot{font-size:11px;color:#127a83;font-weight:600}
  .mesa-card2.empty{opacity:.85}
  .mesa-card2.partial{border-color:#cfe0d6}
  .mesa-card2.full{border-color:#e7c07a;background:#FBF6EC}
  .mesa-card2.over{border-color:var(--danger);background:#FCEDED}
  .mesa-card2.na{border-style:dashed}
  .td-stat{font-size:13px;font-weight:600;color:var(--ink-soft);background:#fafafa;border:1px solid var(--line-soft);border-radius:9px;padding:9px 12px;margin-bottom:12px}
  .td-stat.over{color:var(--danger);background:#FCEDED;border-color:#f0c4c4}
  /* Config de mesas */
  .tc-gen{display:flex;gap:10px}
  .tc-head{display:grid;grid-template-columns:1fr 80px 60px 34px;gap:8px;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);padding:0 2px 4px;font-weight:700}
  .tc-row{display:grid;grid-template-columns:1fr 80px 60px 34px;gap:8px;align-items:center;padding:5px 0;border-bottom:1px solid #efefef}
  .tc-row.over{background:#FCEDED;border-radius:8px}
  .tc-name,.tc-cap{padding:8px 9px;border:1px solid var(--line);border-radius:8px;background:#fafafa;font-size:13px;width:100%}
  .tc-occ{font-size:12px;color:var(--ink-soft);font-weight:600;text-align:center}
  .tc-occ.over{color:var(--danger);font-weight:800}
  .map-res{margin-bottom:12px;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .map-res-i{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;border-bottom:1px solid #efefef;cursor:pointer;font-size:14px}
  .map-res-i:last-child{border-bottom:none}
  .map-res-i:hover{background:#f6f6f4}
  .map-res-t{color:var(--navy);font-weight:700;font-size:13px}
  .dash-filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  .dash-filters select{padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:#fff;font-size:13px;max-width:100%}
  .dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
  .dash-card{background:#fff;border:1px solid var(--line-soft);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
  .dash-card .dn{font-size:26px;font-weight:800;letter-spacing:-.03em;color:var(--navy);line-height:1}
  .dash-card.teal .dn{color:#149aa5}
  .dash-card .dl{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em;margin-top:6px}
  .chart-box{background:#fff;border:1px solid var(--line-soft);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
  .chart-box h3{font-size:14px;font-weight:800;color:var(--navy);margin-bottom:14px}
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;font-size:13px}
  .bar-row .bl{width:32%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
  .bar-row .bt{flex:1;background:#ececec;border-radius:6px;height:18px;overflow:hidden}
  .bar-row .bt span{display:block;height:100%;background:var(--navy);border-radius:6px;min-width:2px}
  .bar-row .bt span.teal{background:var(--teal)}
  .bar-row .bv{width:70px;text-align:right;color:var(--ink-soft);font-weight:600;font-size:12px}
  @media(max-width:520px){.dash-grid{grid-template-columns:repeat(2,1fr)}.bar-row .bl{width:40%}}
  .actions{display:flex;gap:8px;flex-wrap:wrap}

  .filters{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap}
  .chip{font-size:12.5px;font-weight:600;padding:7px 12px;border-radius:999px;background:var(--card);border:1px solid var(--line);color:var(--ink-soft);white-space:nowrap}
  .chip.on{background:var(--navy);color:#fff;border-color:var(--navy)}

  .list{display:flex;flex-direction:column;gap:8px}
  .guest{background:var(--card);border:1px solid var(--line-soft);border-radius:12px;padding:13px 14px;display:flex;align-items:center;gap:12px;transition:.12s}
  .guest.present{background:var(--teal-tint);border-color:var(--teal-line)}
  .guest .gi{flex:1;min-width:0}
  .guest .gname{font-weight:600;font-size:15.5px;letter-spacing:-.01em;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .guest .gsub{font-size:12.5px;color:var(--ink-soft);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap}
  .table-chip{display:inline-flex;align-items:center;gap:5px;background:var(--navy-tint);color:var(--navy);font-size:12px;font-weight:700;padding:3px 9px;border-radius:7px;cursor:pointer}
  .table-chip:hover{background:#dde4f2}
  .table-chip.none{background:#eeeeef;color:var(--ink-soft)}
  .time{font-size:11.5px;color:#127a83;font-weight:700;display:inline-flex;align-items:center;gap:4px}
  .ck{flex-shrink:0;display:inline-flex;align-items:center;gap:6px;font-weight:700;font-size:13.5px;padding:9px 14px;border-radius:10px;border:1.5px solid var(--navy);color:var(--navy);background:var(--card);transition:.12s}
  .ck:hover{background:var(--navy-tint)}
  .ck.done{background:var(--teal);color:#0c3a3f;border-color:var(--teal)}
  .ck.done:hover{background:#25aeb9}
  .row-menu{flex-shrink:0;width:32px;height:32px;border-radius:8px;color:var(--ink-soft);font-size:18px;display:inline-flex;align-items:center;justify-content:center}
  .row-menu:hover{background:#ededee}

  /* ===== Modal ===== */
  .overlay{position:fixed;inset:0;background:rgba(40,40,42,.45);z-index:50;display:flex;align-items:center;justify-content:center;padding:18px}
  .modal{background:var(--card);border-radius:16px;width:100%;max-width:460px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
  .modal-head{padding:18px 20px 0;display:flex;align-items:center;justify-content:space-between}
  .modal-head h3{font-size:18px;font-weight:800;letter-spacing:-.02em;color:var(--navy)}
  .modal-body{padding:16px 20px 20px}
  .x{width:32px;height:32px;border-radius:8px;font-size:20px;color:var(--ink-soft)}
  .x:hover{background:#ededee}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin-bottom:5px}
  .field input,.field select{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;background:#fafafa}
  .field input:focus,.field select:focus{outline:2px solid var(--navy);outline-offset:-1px;border-color:transparent;background:#fff}
  .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px;border:1px solid var(--line);border-radius:10px;background:#fafafa;margin-bottom:13px;cursor:pointer}
  .toggle-row .t-lbl{font-weight:600;font-size:14px}
  .toggle-row .t-sub{font-size:12px;color:var(--ink-soft);margin-top:2px}
  .sw{width:46px;height:27px;border-radius:99px;background:#c8c9ca;position:relative;transition:.15s;flex-shrink:0}
  .sw.on{background:var(--teal)}
  .sw::after{content:'';position:absolute;width:21px;height:21px;border-radius:50%;background:#fff;top:3px;left:3px;transition:.15s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .sw.on::after{left:22px}

  .import-help{font-size:12.5px;color:var(--ink-soft);background:#fafafa;border:1px dashed var(--line);border-radius:10px;padding:12px;margin-bottom:13px;line-height:1.55}
  .tmpl-btn{display:flex;align-items:center;justify-content:space-between;width:100%;border:1px solid var(--line);border-radius:10px;padding:12px 14px;background:var(--navy-tint);color:var(--navy);font-weight:700;font-size:13.5px;margin-bottom:13px}
  .tmpl-btn:hover{background:#dde4f2}
  .filedrop{border:1.5px dashed #c2c3c4;border-radius:12px;padding:26px 16px;text-align:center;color:var(--ink-soft);cursor:pointer;transition:.12s}
  .filedrop:hover{border-color:var(--navy);color:var(--navy);background:var(--navy-tint)}
  .preview-tbl{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px}
  .preview-tbl th{text-align:left;color:var(--ink-soft);font-size:11px;text-transform:uppercase;letter-spacing:.05em;padding:6px 8px;border-bottom:1px solid var(--line)}
  .preview-tbl td{padding:7px 8px;border-bottom:1px solid #efefef}

  .rep-sum{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:8px}
  .rep-box{background:#fafafa;border:1px solid var(--line-soft);border-radius:12px;padding:14px;text-align:center}
  .rep-box .n{font-size:26px;font-weight:800;letter-spacing:-.03em;color:var(--navy)}
  .rep-box .l{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em;margin-top:4px}
  .rep-section h4{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);margin:16px 0 8px}
  .rep-list{font-size:13.5px}
  .rep-list .ri{display:flex;justify-content:space-between;padding:8px 4px;border-bottom:1px solid #efefef}
  .table-grp{margin-bottom:10px}
  .table-grp .tg-head{font-weight:700;font-size:13px;background:var(--navy-tint);color:var(--navy);padding:6px 10px;border-radius:7px;display:flex;justify-content:space-between}
  .table-grp .tg-body{padding:4px 10px;font-size:13px;color:var(--ink-soft)}
  .export-row{display:flex;gap:8px;margin-top:18px}
  .export-row .btn{flex:1;justify-content:center}

  /* Bloco 7 — textarea, observações, filtro empresa, ficha histórico, feed, painel ao vivo */
  .field textarea{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;background:#fafafa;font-family:inherit;font-size:16px;resize:vertical}
  .field textarea:focus{outline:2px solid var(--navy);outline-offset:-1px;border-color:transparent;background:#fff}
  .guest .gnote{font-size:12.5px;color:var(--amber);background:var(--amber-tint);border-radius:6px;padding:3px 8px;margin-top:5px;display:inline-block;line-height:1.35}
  .comp-filter{display:flex;align-items:center;gap:8px;margin:0 0 14px}
  .comp-filter .cf-ic{color:var(--navy);font-size:15px}
  .comp-filter select{flex:1;max-width:340px;padding:8px 10px;border:1px solid var(--line);border-radius:9px;background:#fff;font-size:13.5px;color:var(--ink)}
  .comp-filter .cf-clear{font-size:12.5px;color:var(--navy);font-weight:600;text-decoration:underline}
  .hist-card{background:var(--base);border:1px solid var(--line-soft);border-radius:12px;padding:6px 14px;margin-bottom:8px}
  .hist-card .hr{display:flex;justify-content:space-between;gap:14px;padding:8px 0;border-bottom:1px solid #e7e7e7;font-size:13.5px}
  .hist-card .hr:last-child{border-bottom:none}
  .hist-card .hr span{color:var(--ink-soft)}
  .hist-card .hr b{text-align:right}
  .feed{font-size:13.5px}
  .feed .fi{display:flex;align-items:flex-start;gap:9px;padding:9px 2px;border-bottom:1px solid #efefef}
  .feed .fic{flex:none;width:22px;height:22px;border-radius:50%;background:var(--navy-tint);color:var(--navy);font-size:12px;display:flex;align-items:center;justify-content:center;margin-top:1px}
  .feed .ft{flex:1;line-height:1.4}
  .feed .time{flex:none;color:var(--ink-soft);font-size:12px;white-space:nowrap}
  .live-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
  .live-box{background:var(--base);border:1px solid var(--line-soft);border-radius:12px;padding:12px 6px;text-align:center}
  .live-box.hl{background:var(--teal-tint);border-color:var(--teal-line)}
  .live-box .n{font-size:26px;font-weight:800;color:var(--navy)}
  .live-box.hl .n{color:#127a83}
  .live-box .l{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
  .live-bar-wrap{height:8px;background:var(--line-soft);border-radius:999px;overflow:hidden;margin-bottom:6px}
  .live-pct{height:100%;background:var(--teal);transition:width .4s}
  .lb-chart{display:flex;align-items:flex-end;gap:3px;height:120px;padding-top:14px}
  .lb-col{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end}
  .lb-bar{width:100%;min-height:2px;background:var(--teal);border-radius:4px 4px 0 0;position:relative;transition:height .4s}
  .lb-bar .lb-v{position:absolute;top:-13px;left:0;right:0;text-align:center;font-size:10px;font-weight:700;color:var(--navy)}
  .lb-x{font-size:9.5px;color:var(--ink-soft);margin-top:3px;height:12px}

  /* Bloco 8 — QR: leitura, crachá */
  .scan-tabs{display:flex;background:var(--base);border-radius:10px;padding:4px;margin-bottom:12px}
  .scan-tabs button{flex:1;padding:9px;border-radius:8px;font-weight:700;font-size:13px;color:var(--ink-soft)}
  .scan-tabs button.on{background:#fff;color:var(--navy);box-shadow:var(--shadow)}
  .scan-result{min-height:0;margin-bottom:10px}
  .scan-result.ok,.scan-result.warn,.scan-result.err{display:flex;align-items:center;gap:12px;padding:14px;border-radius:12px;margin-bottom:14px;min-height:64px}
  .scan-result.ok{background:var(--teal-tint);border:1px solid var(--teal-line)}
  .scan-result.warn{background:var(--amber-tint);border:1px solid #ecd9b0}
  .scan-result.err{background:#fbeaea;border:1px solid #f0cdcd}
  .scan-result .sr-ic{flex:none;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff}
  .scan-result.ok .sr-ic{background:var(--teal)}
  .scan-result.warn .sr-ic{background:var(--amber)}
  .scan-result.err .sr-ic{background:var(--danger)}
  .scan-result b{font-size:16px}
  .scan-result .sr-sub{font-size:12.5px;color:var(--ink-soft);margin-top:2px;line-height:1.35}
  .qr-cam{width:100%;max-width:320px;margin:0 auto;border-radius:12px;overflow:hidden;background:#000;min-height:60px}
  .qr-cam video{width:100%!important;display:block}
  .qr-card{background:#fff;border:1px solid var(--line-soft);border-radius:14px;padding:22px;text-align:center;box-shadow:var(--shadow)}
  .qr-card .qr-name{font-size:18px;font-weight:800;color:var(--ink);margin-top:12px}
  .qr-card .qr-comp{font-size:13px;color:var(--ink-soft);margin-top:2px}
  .qr-card .qr-token{font-size:18px;letter-spacing:.35em;color:var(--navy);font-weight:700;margin-top:8px}

  /* Admin */
  .u-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid #efefef}
  .u-row .ui{flex:1;min-width:0}
  .u-row .un{font-weight:700;font-size:14px}
  .u-row .ue{font-size:12px;color:var(--ink-soft)}
  .u-row select{padding:7px 8px;border:1px solid var(--line);border-radius:8px;background:#fafafa;font-size:13px}
  .badge-you{font-size:10px;font-weight:800;background:var(--teal-tint);color:#127a83;padding:2px 7px;border-radius:6px;letter-spacing:.04em}

  .menu-pop{position:fixed;z-index:60;background:#fff;border:1px solid var(--line-soft);border-radius:11px;box-shadow:0 12px 32px rgba(0,0,0,.16);overflow:hidden;min-width:185px}
  .menu-pop button{display:block;width:100%;text-align:left;padding:11px 15px;font-size:14px;color:var(--ink)}
  .menu-pop button:hover{background:#f5f5f5}
  .menu-pop button.danger{color:var(--danger)}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:12px 20px;border-radius:11px;font-size:14px;font-weight:500;z-index:80;opacity:0;transition:.25s;box-shadow:0 8px 24px rgba(0,0,0,.25)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .config-warn{max-width:560px;margin:60px auto;background:#fff;border:1px solid var(--line);border-radius:16px;padding:28px;line-height:1.6}
  .config-warn h2{color:var(--navy);margin-bottom:10px}
  .config-warn code{background:var(--base);padding:2px 7px;border-radius:6px;font-size:13px}

  @media(max-width:520px){
    .stats{grid-template-columns:repeat(2,1fr)}
    .actions .btn span.lbl{display:none}
    .actions .btn{padding:10px 12px}
    .topbar .appname{display:none}
  }
  @media print{
    body *{visibility:hidden}
    #printArea{display:block!important;position:absolute;left:0;top:0;width:100%;padding:24px;visibility:visible}
    #printArea *{visibility:visible}
  }
  #printArea{display:none}
</style>
</head>
<body>
<div class="topbar">
  <button class="back" id="backBtn" style="display:none" onclick="goHome()">‹</button>
  <img src="logo-moura.png" alt="Moura" onerror="this.style.display='none'">
  <span class="appname">Check-in de Eventos</span>
  <div class="top-right">
    <span class="pill off" id="connPill"><span class="d"></span><span id="connText">—</span></span>
    <span class="pill pend" id="operatorBadge" style="display:none"><span class="d"></span>Operador</span>
    <button class="userbtn" id="userBtn" style="display:none" onclick="userMenu(event)">·</button>
  </div>
</div>

<div id="screen"></div>
<div id="modalRoot"></div>
<div class="toast" id="toast"></div>
<div id="printArea"></div>


<script>
/* ====================================================================
   Moura · Check-in — SPA portada para a API REST (sem Supabase)
   Mantém a estrutura/visual originais; troca apenas a camada de dados.
   ==================================================================== */

/* ============ AUTENTICAÇÃO / API (reaproveitado da referência) ============ */
const params = new URLSearchParams(location.search);
let TOKEN = params.get('token') || localStorage.getItem('ci_token') || '';
const API  = (window.CHECKIN_API || '').replace(/\/$/, '');
if (TOKEN) localStorage.setItem('ci_token', TOKEN);

// JWT tem 3 partes separadas por ponto e começa com "eyJ"; operator token é hex
function isJwt(t){ return t && t.startsWith('eyJ') && t.split('.').length === 3; }

function apiFetch(path, opts, tok){
  const t = (tok!==undefined && tok!==null) ? tok : TOKEN;
  return fetch(API + path, {
    ...opts,
    headers: { 'Authorization': 'Bearer ' + (t||''), 'Content-Type': 'application/json', ...(opts && opts.headers || {}) },
  }).then(async r => {
    const data = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(data.error || 'Erro ' + r.status);
    return data;
  });
}
function logout(){ localStorage.removeItem('ci_token'); location.replace('./'); }
function getInitial(jwt){
  try{ const p = JSON.parse(atob(jwt.split('.')[1])); return (p.name||p.email||'?')[0].toUpperCase(); }
  catch(e){ return '?'; }
}

/* ============ ESTADO GLOBAL ============ */
let state={view:'home',events:[],guestCounts:{},current:null,guests:[],categories:[],tables:[],filter:'all',catFilter:'',compFilter:'',search:'',lastSync:null};
let refetchTimer=null, _liveTimer=null, _qrScanner=null, _scanTab='reader', _lastScan={t:'',at:0};
let _focusSearch=false, _preserveScroll=false;
let LOGO_DATA=null;

const $=s=>document.querySelector(s);
const nowISO=()=>new Date().toISOString();
const live=arr=>arr.filter(g=>!g.deleted);

/* ============ NORMALIZAÇÃO (API → forma esperada pelo render original) ============ */
function normEvent(ev){
  // mantém id (int). date ← event_date. flags 0/1 → boolean.
  return Object.assign({}, ev, {
    date: ev.event_date || '',
    has_tables: !!ev.has_tables,
    use_categories: !!ev.use_categories
  });
}
function normGuest(p){
  return {
    id: p.id,
    event_id: state.current ? state.current.id : (p.event_id||null),
    name: p.name || '',
    company: p.company || '',
    phone: p.phone || '',
    notes: p.notes || '',
    table_number: p.table_number || '',
    category_id: (p.category_id===undefined?null:p.category_id),
    qr_token: p.qr_token || '',
    checked_in: !!p.checked_in_at,
    check_in_time: p.checked_in_at || null,
    deleted: false,
    table_log: []
  };
}

/* ============ CONEXÃO / STATUS ============ */
function updateConn(){
  const p=$('#connPill'),t=$('#connText'); if(!p)return;
  if(navigator.onLine){ p.className='pill ok'; t.textContent='Online'; }
  else{ p.className='pill off'; t.textContent='Offline'; }
}
window.addEventListener('online',()=>{ updateConn(); refetchAll(); if(state.view==='event'&&state.current) silentRefreshEvent(); });
window.addEventListener('offline',updateConn);

/* ============ PERMISSÕES ============ */
// Usuário logado tem acesso total (não há mais perfis/papéis).
function can(a){ return true; }

/* ============ AUTENTICAÇÃO ============ */
function initApp(){
  if(!TOKEN){ renderAuth(); return; }
  // Topbar conforme tipo de token
  if(isJwt(TOKEN)){
    $('#userBtn').style.display='inline-flex';
    $('#userBtn').textContent=getInitial(TOKEN);
    const ob=$('#operatorBadge'); if(ob) ob.style.display='none';
  }else{
    $('#userBtn').style.display='none';
    const ob=$('#operatorBadge'); if(ob) ob.style.display='inline-flex';
  }
  restoreNav();
}

async function restoreNav(){
  await refetchAll();
  const ev = params.get('event');
  if(ev){
    const found = state.events.find(e=>String(e.id)===String(ev));
    if(found){ openEvent(found.id); return; }
  }
  goHome();
}

/* ---- Tela de login (somente login, sem cadastro) ---- */
function renderAuth(){
  $('#userBtn').style.display='none';
  $('#backBtn').style.display='none';
  const ob=$('#operatorBadge'); if(ob) ob.style.display='none';
  $('#screen').innerHTML=`<div class="auth-wrap"><div class="auth-card">
    <img class="logo" src="logo-moura.png" onerror="this.style.display='none'">
    <div class="tag">Check-in de Eventos</div>
    <div class="auth-err" id="authErr"></div>
    <div class="field"><label>E-mail</label><input id="aEmail" type="email" placeholder="voce@moura.com.br"></div>
    <div class="field"><label>Senha</label><input id="aPass" type="password" placeholder="••••••••"></div>
    <button class="btn btn-primary btn-block" onclick="doLogin()">Entrar</button>
    <div class="auth-note">Equipe Moura · acesso restrito</div>
  </div></div>`;
  setTimeout(()=>{const i=$('#aEmail');if(i)i.focus();},50);
  const pass=$('#aPass'); if(pass) pass.addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
  const em=$('#aEmail'); if(em) em.addEventListener('keydown',e=>{ if(e.key==='Enter'){const p=$('#aPass');if(p)p.focus();} });
}
function authErr(msg){ const e=$('#authErr'); if(!e)return; e.textContent=msg; e.style.display='block'; }
async function doLogin(){
  const email=$('#aEmail').value.trim(), pass=$('#aPass').value;
  if(!email||!pass){ authErr('Preencha e-mail e senha.'); return; }
  try{
    const data=await apiFetch('/api/auth/login',{method:'POST',body:JSON.stringify({email,password:pass})},'');
    TOKEN=data.token; localStorage.setItem('ci_token',TOKEN);
    // Atualiza topbar e segue para a home
    $('#userBtn').style.display='inline-flex';
    $('#userBtn').textContent=getInitial(TOKEN);
    const ob=$('#operatorBadge'); if(ob) ob.style.display='none';
    restoreNav();
  }catch(e){
    authErr(e.message==='Credenciais inválidas.'?'E-mail ou senha incorretos.':e.message);
  }
}

/* ============ CATEGORIAS ============ */
function catById(id){ return state.categories.find(c=>String(c.id)===String(id)); }
function textOn(hex){
  try{ const h=hex.replace('#',''); const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);
    return (0.299*r+0.587*g+0.114*b)>150?'#1c1c1c':'#fff'; }catch(e){ return '#fff'; }
}
function catChip(id){
  const c=catById(id); if(!c) return '';
  return `<span class="cat-chip" style="background:${esc(c.color)};color:${textOn(c.color)}">${esc(c.name)}</span>`;
}
async function seedCategories(eventId){
  try{
    await apiFetch('/api/checkin/events/'+eventId+'/categories/seed',{method:'POST'});
    await reloadCategories();
  }catch(e){ toast('Erro ao criar categorias'); }
}
async function reloadCategories(){
  if(!state.current) return;
  try{ state.categories=await apiFetch('/api/checkin/events/'+state.current.id+'/categories'); }
  catch(e){ /* mantém */ }
}
async function modalCategories(){
  await reloadCategories();
  renderCatList();
}
function renderCatList(){
  const cats=state.categories;
  const rows=cats.map((c,i)=>`<div class="cat-row">
      <span class="cat-sw" style="background:${esc(c.color)}"></span>
      <span class="cat-name">${esc(c.name)}</span>
      <span style="color:var(--ink-soft);font-size:12px">${typeof c.total==='number'?c.total:state.guests.filter(g=>!g.deleted&&String(g.category_id)===String(c.id)).length}</span>
      <button class="cat-mini" onclick="modalCatEdit('${c.id}')">✎</button>
      <button class="cat-mini danger" onclick="deleteCat('${c.id}')">🗑</button>
    </div>`).join('');
  modalRoot().innerHTML=shell('Categorias do evento',`
    <div id="catList">${rows||'<div style="color:var(--ink-soft);font-size:13px;padding:8px 0">Nenhuma categoria. Adicione abaixo.</div>'}</div>
    <button class="btn btn-primary btn-block" style="margin-top:14px" onclick="modalCatEdit()">+ Adicionar categoria</button>
    <div class="import-help" style="margin-top:12px">As categorias aparecem na lista, nos filtros e nos relatórios. Excluir uma categoria não apaga os convidados — eles apenas ficam sem categoria.</div>`);
}
const CAT_COLORS=['#B57614','#2C427E','#15795B','#7A2733','#2BC2CE','#6E6F72','#A4343A','#5B4B8A','#C2185B','#00796B','#455A64','#E64A19'];
function modalCatEdit(id){
  const c=id?catById(id):{name:'',color:CAT_COLORS[state.categories.length%CAT_COLORS.length]};
  modalRoot()._catEdit={id:id||null,color:c.color};
  const swatches=CAT_COLORS.map(col=>`<span class="color-pick ${col===c.color?'on':''}" data-col="${col}" style="background:${col}" onclick="pickCatColor('${col}')"></span>`).join('');
  modalRoot().innerHTML=shell(id?'Editar categoria':'Nova categoria',`
    <div class="field"><label>Nome</label><input id="catName" value="${esc(c.name)}" placeholder="Ex: VIP"></div>
    <div class="field"><label>Cor</label><div class="color-row" id="colorRow">${swatches}</div></div>
    <button class="btn btn-primary btn-block" onclick="saveCat()">${id?'Salvar':'Adicionar'}</button>
    <button class="btn btn-ghost btn-block" style="margin-top:8px" onclick="modalCategories()">Voltar</button>`);
  setTimeout(()=>{const i=$('#catName');if(i)i.focus();},50);
}
function pickCatColor(col){ modalRoot()._catEdit.color=col; document.querySelectorAll('#colorRow .color-pick').forEach(s=>s.classList.toggle('on',s.dataset.col===col)); }
async function saveCat(){
  const ed=modalRoot()._catEdit; const name=$('#catName').value.trim();
  if(!name){ toast('Informe o nome'); return; }
  try{
    if(ed.id){ await apiFetch('/api/checkin/categories/'+ed.id,{method:'PATCH',body:JSON.stringify({name,color:ed.color})}); }
    else{ await apiFetch('/api/checkin/events/'+state.current.id+'/categories',{method:'POST',body:JSON.stringify({name,color:ed.color})}); }
  }catch(e){ toast('Erro ao salvar'); return; }
  await reloadCategories(); renderCatList(); renderEvent(); toast('Categoria salva');
}
async function deleteCat(id){
  if(!confirm('Excluir esta categoria? Os convidados ficarão sem categoria.')) return;
  try{ await apiFetch('/api/checkin/categories/'+id,{method:'DELETE'}); }
  catch(e){ toast('Erro ao excluir'); return; }
  state.guests.forEach(g=>{ if(String(g.category_id)===String(id)) g.category_id=null; });
  await reloadCategories(); renderCatList(); renderEvent(); toast('Categoria excluída');
}

/* ============ MENU DO USUÁRIO ============ */
function userMenu(e){
  e.stopPropagation(); document.querySelectorAll('.menu-pop').forEach(m=>m.remove());
  if(!isJwt(TOKEN)) return; // operador (link) não tem logout
  const pop=document.createElement('div'); pop.className='menu-pop';
  let nameTxt='', emailTxt='';
  try{ const p=JSON.parse(atob(TOKEN.split('.')[1])); nameTxt=p.name||''; emailTxt=p.email||''; }catch(_){}
  pop.innerHTML=`<div style="padding:11px 15px;border-bottom:1px solid #efefef"><b style="font-size:13.5px">${esc(nameTxt||emailTxt||'Usuário')}</b>${emailTxt?`<div style="font-size:11.5px;color:var(--ink-soft)">${esc(emailTxt)}</div>`:''}</div>
    <button class="danger" onclick="logout();this.parentNode.remove()">Sair</button>`;
  document.body.appendChild(pop);
  const r=e.target.getBoundingClientRect();
  pop.style.top=(r.bottom+8)+'px'; pop.style.right='14px';
  setTimeout(()=>document.addEventListener('click',function h(){pop.remove();document.removeEventListener('click',h);}),10);
}

/* ============ DADOS: EVENTOS ============ */
async function refetchAll(){
  if(!TOKEN) return;
  try{
    const evs=await apiFetch('/api/checkin/events');
    state.events=evs.map(normEvent);
    const c={};
    evs.forEach(e=>{ c[e.id]={t:e.total_confirmed||0,p:e.checked_in||0}; });
    state.guestCounts=c;
    state.lastSync=Date.now();
  }catch(e){
    if(String(e.message).includes('401') || /expirad|inválid/i.test(e.message)){
      localStorage.removeItem('ci_token'); TOKEN=''; renderAuth(); authErr('Sua sessão expirou. Faça login novamente.');
      throw e;
    }
    // mantém eventos atuais em outros erros
  }
}
async function goHome(){
  stopRealtime(); state.view='home'; state.current=null; state.guests=[];
  state.filter='all'; state.search='';
  $('#backBtn').style.display='none';
  renderHome();
  try{ await refetchAll(); }catch(e){ return; }
  if(state.view==='home') renderHome();
}
async function openEvent(id){
  const ev=state.events.find(e=>String(e.id)===String(id)); if(!ev) return;
  state.current=ev; state.view='event';
  state.filter='all'; state.search=''; state.catFilter=''; state.compFilter='';
  _focusSearch=true; _preserveScroll=false;
  state.guests=[]; state.categories=[]; state.tables=[];
  $('#backBtn').style.display='inline-flex';
  renderEvent();
  // Carrega categorias/mesas conforme flags
  try{
    if(ev.use_categories) await reloadCategories();
    if(ev.has_tables) await reloadTables();
    const ps=await apiFetch('/api/checkin/events/'+id+'/participants');
    state.guests=ps.map(normGuest);
    state.lastSync=Date.now();
    if(state.view==='event'&&state.current&&String(state.current.id)===String(id)) renderEvent();
  }catch(e){ toast('Erro ao carregar convidados'); }
  startRealtime(id);
}
// "Realtime" → polling a cada 15s + no foco da janela
function startRealtime(eid){
  stopRealtime();
  refetchTimer=setInterval(()=>{
    if(state.view==='event'&&state.current&&String(state.current.id)===String(eid)) silentRefreshEvent();
  },15000);
}
function stopRealtime(){ if(refetchTimer){ clearInterval(refetchTimer); refetchTimer=null; } }
async function silentRefreshEvent(){
  if(!state.current) return;
  try{
    const ps=await apiFetch('/api/checkin/events/'+state.current.id+'/participants');
    state.guests=ps.map(normGuest);
    state.lastSync=Date.now();
    if(state.view==='event'){ _preserveScroll=true; renderEvent(); }
  }catch(e){ /* silencioso */ }
}
window.addEventListener('focus',()=>{ if(state.view==='event'&&state.current) silentRefreshEvent(); });

function computeStats(){
  const g=live(state.guests); const total=g.length; const present=g.filter(x=>x.checked_in).length;
  return {total,present,absent:total-present,pct:total?Math.round(present/total*100):0};
}

/* ============ MUTAÇÕES (online-first) ============ */
async function createEvent(d){
  try{
    const r=await apiFetch('/api/checkin/events',{method:'POST',body:JSON.stringify({
      name:d.name, event_date:d.date||null, location:d.location||'',
      has_tables:d.hasTables?1:0, use_categories:d.useCategories?1:0
    })});
    const ev=normEvent(r.event);
    state.events.unshift(ev);
    closeModal();
    if(ev.use_categories) await seedCategories(ev.id);
    openEvent(ev.id); toast('Evento criado');
  }catch(e){ toast('Erro ao criar evento'); }
}
async function updateEventMeta(d){
  const wasCat=state.current.use_categories;
  try{
    const r=await apiFetch('/api/checkin/events/'+state.current.id,{method:'PATCH',body:JSON.stringify({
      name:d.name, event_date:d.date||null, location:d.location||'',
      has_tables:d.hasTables?1:0, use_categories:d.useCategories?1:0
    })});
    Object.assign(state.current, normEvent(r.event));
  }catch(e){ toast('Erro ao salvar'); return; }
  closeModal();
  if(!wasCat && state.current.use_categories && !state.categories.length) await seedCategories(state.current.id);
  renderEvent(); toast('Evento atualizado');
}
async function deleteEventNow(id){
  try{ await apiFetch('/api/checkin/events/'+id,{method:'DELETE'}); }
  catch(e){ toast('Erro ao excluir'); return; }
  state.events=state.events.filter(e=>String(e.id)!==String(id));
  closeModal(); goHome(); toast('Evento excluído');
}
async function addGuest(d){
  try{
    const r=await apiFetch('/api/checkin/events/'+state.current.id+'/participants',{method:'POST',body:JSON.stringify({
      name:d.name.trim(), company:d.company||'', phone:d.phone||'', notes:d.notes||'',
      table_number:d.table?String(d.table).trim():null, category_id:d.category_id||null
    })});
    state.guests.push(normGuest(r.participant));

}
async function updateGuest(gid,d){
  const g=state.guests.find(x=>String(x.id)===String(gid)); if(!g)return;
  const body={ name:d.name.trim(), company:d.company||'', phone:d.phone||'', notes:d.notes||'' };
  if('table' in d) body.table_number=String(d.table||'').trim()||null;
  if('category_id' in d) body.category_id=d.category_id||null;
  try{
    const r=await apiFetch('/api/checkin/participant/'+gid,{method:'PATCH',body:JSON.stringify(body)});
    Object.assign(g, normGuest(r.participant));
  }catch(e){ toast('Erro ao salvar'); return; }
  closeModal(); renderEvent(); toast('Convidado atualizado');
}
async function changeCategory(gid,catId){
  const g=state.guests.find(x=>String(x.id)===String(gid)); if(!g)return;
  try{
    const r=await apiFetch('/api/checkin/participant/'+gid,{method:'PATCH',body:JSON.stringify({category_id:catId||null})});
    Object.assign(g, normGuest(r.participant));
  }catch(e){ toast('Erro ao salvar'); return; }
  closeModal(); renderEvent(); toast('Categoria atualizada');
}
async function toggleCheckin(gid){
  const g=state.guests.find(x=>String(x.id)===String(gid)); if(!g)return;
  const turningOn=!g.checked_in;
  // otimista
  g.checked_in=turningOn; g.check_in_time=turningOn?nowISO():null;
  _preserveScroll=true; renderEvent();
  try{
    if(turningOn){
      const r=await apiFetch('/api/checkin/register',{method:'POST',body:JSON.stringify({participant_id:g.id})});
      g.checked_in=true; g.check_in_time=r.checked_in_at||g.check_in_time;
    }else{
      await apiFetch('/api/checkin/unregister',{method:'POST',body:JSON.stringify({participant_id:g.id})});
      g.checked_in=false; g.check_in_time=null;
    }
    refreshCount();
  }catch(e){
    // reverte
    g.checked_in=!turningOn; g.check_in_time=turningOn?null:nowISO();
    toast('Erro: '+e.message); _preserveScroll=true; renderEvent();
  }
}
async function changeTable(gid,nt){
  const g=state.guests.find(x=>String(x.id)===String(gid)); if(!g)return;
  const from=g.table_number||'—';
  try{
    const r=await apiFetch('/api/checkin/participant/'+gid,{method:'PATCH',body:JSON.stringify({table_number:String(nt).trim()||null})});
    Object.assign(g, normGuest(r.participant));
  }catch(e){ toast('Erro ao salvar'); return; }
  closeModal(); renderEvent(); toast('Mesa: '+from+' → '+(g.table_number||'—'));
}
async function deleteGuest(gid){
  const g=state.guests.find(x=>String(x.id)===String(gid)); if(!g)return;
  try{ await apiFetch('/api/checkin/participant/'+gid,{method:'DELETE'}); }

}
function refreshCount(){
  if(!state.current) return;

  state.guestCounts[state.current.id]={t:s.total,p:s.present};
}

let importBuffer=null;
function downloadTemplate(){
  const cat=state.current&&state.current.use_categories;
  const rows=[
    cat?{Nome:'Maria Silva',Mesa:'1',Categoria:'VIP',Empresa:'Vinícola Exemplo',Telefone:'(54) 99999-0000'}:{Nome:'Maria Silva',Mesa:'1',Empresa:'Vinícola Exemplo',Telefone:'(54) 99999-0000'},
    cat?{Nome:'João Souza',Mesa:'1',Categoria:'Convidado',Empresa:'',Telefone:''}:{Nome:'João Souza',Mesa:'1',Empresa:'',Telefone:''},
    cat?{Nome:'Ana Pereira',Mesa:'2',Categoria:'Imprensa',Empresa:'',Telefone:''}:{Nome:'Ana Pereira',Mesa:'2',Empresa:'Convidado',Telefone:''}];
  const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=cat?[{wch:28},{wch:8},{wch:16},{wch:24},{wch:18}]:[{wch:28},{wch:8},{wch:24},{wch:18}];
  const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Convidados');
  XLSX.writeFile(wb,'modelo_lista_convidados.xlsx'); toast('Modelo baixado');
}
function handleFile(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'binary'});
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:''});
      if(!rows.length){ toast('Planilha vazia'); return; }
      const header=rows[0].map(h=>String(h).toLowerCase().trim());
      const nameIdx=header.findIndex(h=>/nome|name|convidad/.test(h));
      const tableIdx=header.findIndex(h=>/mesa|table/.test(h));
      const compIdx=header.findIndex(h=>/empres|company|organiz/.test(h));
      const phoneIdx=header.findIndex(h=>/tel|phone|celular|fone/.test(h));
      const catIdx=header.findIndex(h=>/categoria|category|tipo/.test(h));
      const startRow=nameIdx>=0?1:0, nIdx=nameIdx>=0?nameIdx:0;
      const catByName={}; state.categories.forEach(c=>catByName[c.name.toLowerCase()]=c.id);
      const parsed=[];
      for(let i=startRow;i<rows.length;i++){
        const r=rows[i]; const name=String(r[nIdx]||'').trim(); if(!name)continue;
        const catName=catIdx>=0?String(r[catIdx]||'').trim():'';
        parsed.push({name,table:tableIdx>=0?String(r[tableIdx]||'').trim():'',company:compIdx>=0?String(r[compIdx]||'').trim():'',phone:phoneIdx>=0?String(r[phoneIdx]||'').trim():'',category_id:(state.current.use_categories&&catName&&catByName[catName.toLowerCase()])||null,categoryName:catName});
      }
      if(!parsed.length){ toast('Nenhum nome encontrado'); return; }
      importBuffer=parsed;
      renderImportPreview(parsed,{table:tableIdx>=0,company:compIdx>=0,category:catIdx>=0&&state.current.use_categories});
    }catch(err){ console.error(err); toast('Erro ao ler arquivo'); }
  };
  reader.readAsBinaryString(file);
}
async function confirmImport(){
  if(!importBuffer)return;
  const rows=importBuffer.map(p=>({name:p.name,company:p.company,phone:p.phone,table_number:p.table||null}));
  try{
    const r=await apiFetch('/api/checkin/events/'+state.current.id+'/participants/bulk',{method:'POST',body:JSON.stringify({rows})});
    importBuffer=null; closeModal();
    // recarrega convidados do servidor (ids são atribuídos lá)
    const ps=await apiFetch('/api/checkin/events/'+state.current.id+'/participants');
    state.guests=ps.map(normGuest);
    refreshCount(); renderEvent();
    toast((r.added||0)+' importados'+(r.skipped?' · '+r.skipped+' duplicados ignorados':''));
  }catch(e){ toast('Erro ao importar'); }
}

}

/* ============ HELPERS ============ */
function fmtTime(iso){ if(!iso)return''; return new Date(iso).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }
function fmtDate(s){ if(!s)return''; try{ return new Date(s+'T00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'}); }catch(e){ return s; } }
function fmtDateTime(ts){ if(!ts)return''; return new Date(ts).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'}); }
function slug(s){ return (s||'evento').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,''); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
let toastT; function toast(m){ const t=$('#toast'); t.textContent=m; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2200); }

/* ============ TELAS ============ */
function renderHome(){
  if(state.view!=='home')return;
  let h=`<div class="wrap"><div class="home-head"><div><h1>Eventos</h1><p>${state.events.length} ${state.events.length===1?'evento':'eventos'}</p></div>
    ${can('event_create')?'<button class="btn btn-primary" onclick="modalEvent()">+ Novo evento</button>':''}</div>`;
  if(!state.events.length){
    h+=`<div class="empty"><div class="big">🗓️</div><p>Nenhum evento ainda.<br>Crie o primeiro para começar.</p></div>`;
  }else{
    h+=`<div class="ev-grid">`;
    state.events.forEach(e=>{
      const c=state.guestCounts[e.id]||{t:0,p:0};
      const pct=c.t?Math.round(c.p/c.t*100):0;
      h+=`<div class="ev-card" onclick="openEvent('${e.id}')">
        <div class="ev-main"><h3>${esc(e.name)}</h3>
        <div class="meta"><span>${fmtDate(e.date)||'Sem data'}</span>${e.location?'<span>'+esc(e.location)+'</span>':''}<span>${c.t} convidados</span></div></div>
        <div class="ring"><div class="pct">${pct}%</div><div class="lbl">${c.p}/${c.t}</div></div></div>`;
    });
    h+=`</div>`;
  }
  h+=`</div>`;
  $('#screen').innerHTML=h;
  updateConn();
}

function renderSyncbar(){
  const el=$('#syncUpd'); if(el) el.textContent=syncText();
}
function syncText(){
  return state.lastSync?'Atualizado '+fmtDateTime(state.lastSync):'—';
}

function renderEvent(){
  if(state.view!=='event')return;
  const sy=_preserveScroll?window.scrollY:0;
  const ev=state.current,s=computeStats(); let G=live(state.guests);
  let guests=G.slice();
  if(state.filter==='present')guests=guests.filter(g=>g.checked_in);
  else if(state.filter==='absent')guests=guests.filter(g=>!g.checked_in);
  if(ev.use_categories&&state.catFilter){ guests=guests.filter(g=>String(g.category_id)===String(state.catFilter)); }
  if(state.compFilter){ guests=guests.filter(g=>(g.company||'').trim()===state.compFilter); }
  const q=state.search.trim().toLowerCase();
  if(q){ guests=guests.filter(g=>g.name.toLowerCase().includes(q)||(g.table_number&&g.table_number.toLowerCase().includes(q))||(g.company&&g.company.toLowerCase().includes(q))||(g.phone&&g.phone.toLowerCase().includes(q))||(g.notes&&g.notes.toLowerCase().includes(q))); }
  guests.sort((a,b)=>a.name.localeCompare(b.name,'pt-BR'));
  const totalFound=guests.length;
  const CAP=120; const capped=guests.length>CAP; if(capped) guests=guests.slice(0,CAP);

  let h=`<div class="wrap"><div class="ev-title"><h2>${esc(ev.name)}</h2>
    <div class="meta"><span>${fmtDate(ev.date)||'Sem data'}</span>${ev.location?'<span>'+esc(ev.location)+'</span>':''}${ev.has_tables?'<span>Com mesas</span>':''}
    ${can('event_edit')?'<button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="modalEvent(true)">Editar</button>':''}</div></div>`;

  h+=`<div class="syncbar"><span class="upd" id="syncUpd">${syncText()}</span>
    <button class="refresh" id="refreshBtn" onclick="manualRefresh()"><span>↻</span> Atualizar</button></div>`;

  if(ev.has_tables&&tablesConfigured()){
    const ob=overbookedList();
    if(ob.length) h+=`<div class="ob-banner clickable" onclick="modalTableMap()">⚠ ${ob.length} mesa${ob.length>1?'s':''} com overbooking — toque para ver</div>`;
  }

  h+=`<div class="stats">
    <div class="stat"><div class="n tnum">${s.total}</div><div class="l">Total</div></div>
    <div class="stat hl"><div class="n tnum">${s.present}</div><div class="l">Presentes</div></div>
    <div class="stat"><div class="n tnum">${s.absent}</div><div class="l">Ausentes</div></div>
    <div class="stat"><div class="n tnum">${s.pct}%</div><div class="l">Comparec.</div></div></div>`;

  h+=`<div class="toolbar">
    <div class="search"><span class="ic">⌕</span><input id="searchInput" placeholder="Buscar nome, empresa, mesa, telefone..." value="${esc(state.search)}" oninput="onSearch(this.value)">${state.search?`<button class="search-clear" onclick="clearSearch()">×</button>`:''}</div>
    <div class="actions">
      ${ev.has_tables?'<button class="btn btn-ghost btn-sm" onclick="modalTableMap()">⬡ <span class="lbl">Mesas</span></button>':''}
      <button class="btn btn-ghost btn-sm" onclick="modalLivePanel()">◉ <span class="lbl">Ao vivo</span></button>
      ${can('checkin')?'<button class="btn btn-teal btn-sm" onclick="modalScan()">▦ <span class="lbl">Ler QR</span></button>':''}
      ${can('import')?'<button class="btn btn-ghost btn-sm" onclick="modalImport()">⇪ <span class="lbl">Importar</span></button>':''}
      ${can('guest_edit')?'<button class="btn btn-ghost btn-sm" onclick="modalGuest()">+ <span class="lbl">Adicionar</span></button>':''}
      <button class="btn btn-ghost btn-sm" onclick="modalExport()">⇩ <span class="lbl">Exportar</span></button>
      <button class="btn btn-primary btn-sm" onclick="modalReport()">⊕ <span class="lbl">Relatório</span></button>
    </div></div>`;

  h+=`<div class="filters">${chip('all','Todos',s.total)}${chip('present','Presentes',s.present)}${chip('absent','Ausentes',s.absent)}</div>`;

  if(ev.use_categories&&state.categories.length){
    const catCount=cid=>G.filter(g=>String(g.category_id)===String(cid)).length;
    h+=`<div class="filters cat-filters"><button class="chip ${state.catFilter===''?'on':''}" onclick="setCatFilter('')">Todas categorias</button>`+
      state.categories.map(c=>`<button class="chip cat-f ${String(state.catFilter)===String(c.id)?'on':''}" onclick="setCatFilter('${c.id}')" style="${String(state.catFilter)===String(c.id)?`background:${esc(c.color)};color:${textOn(c.color)};border-color:${esc(c.color)}`:`border-color:${esc(c.color)}`}"><span class="cat-dot" style="background:${esc(c.color)}"></span>${esc(c.name)} · ${catCount(c.id)}</button>`).join('')+`</div>`;
  }

  const compMap={}; G.forEach(g=>{ const c=(g.company||'').trim(); if(c) compMap[c]=(compMap[c]||0)+1; });
  const comps=Object.keys(compMap).sort((a,b)=>compMap[b]-compMap[a]||a.localeCompare(b,'pt-BR'));
  if(comps.length){
    h+=`<div class="comp-filter"><span class="cf-ic">⌂</span><select id="compSel" onchange="setCompFilter(this.value)"><option value="">Todas as empresas (${G.filter(g=>(g.company||'').trim()).length})</option>${comps.map(c=>`<option value="${esc(c)}" ${state.compFilter===c?'selected':''}>${esc(c)} (${compMap[c]})</option>`).join('')}</select>${state.compFilter?`<button class="cf-clear" onclick="setCompFilter('')">limpar</button>`:''}</div>`;
  }

  if(!G.length){
    h+=`<div class="empty"><div class="big">👥</div><p>Lista vazia.${can('guest_edit')?'<br>Importe uma planilha ou adicione convidados.':''}</p>
      ${can('guest_edit')?'<div style="margin-top:16px;display:flex;gap:8px;justify-content:center"><button class="btn btn-primary" onclick="modalImport()">Importar lista</button><button class="btn btn-ghost" onclick="modalGuest()">Adicionar manual</button></div>':''}</div>`;
  }else if(!guests.length){
    h+=`<div class="empty"><p>Nenhum convidado encontrado${state.search?' para "<b>'+esc(state.search)+'</b>"':''}.</p></div>`;
  }else{
    if(q) h+=`<div style="font-size:12.5px;color:var(--ink-soft);margin-bottom:8px">${totalFound} resultado${totalFound>1?'s':''}${capped?' · mostrando os primeiros '+CAP:''}</div>`;
    const ck=can('checkin'), ge=can('guest_edit');
    h+=`<div class="list">`;
    guests.forEach(g=>{
      h+=`<div class="guest ${g.checked_in?'present':''}">
        <div class="gi">
          <div class="gname">${hl(g.name,q)}${ev.use_categories?catChip(g.category_id):''}${ev.has_tables?(g.table_number?`<span class="table-chip" onclick="${ge?`modalTable('${g.id}')`:''}">⬡ Mesa ${esc(g.table_number)}</span>`:(ge?`<span class="table-chip none" onclick="modalTable('${g.id}')">+ mesa</span>`:'')):''}</div>
          <div class="gsub">${g.company?'<span>'+hl(g.company,q)+'</span>':''}${g.phone?'<span>'+hl(g.phone,q)+'</span>':''}${g.checked_in&&g.check_in_time?'<span class="time">✓ '+fmtTime(g.check_in_time)+'</span>':''}</div>
          ${g.notes?`<div class="gnote">📝 ${esc(g.notes)}</div>`:''}
        </div>
        <button class="ck ${g.checked_in?'done':''}" ${ck?`onclick="toggleCheckin('${g.id}')"`:'style="opacity:.45;cursor:default" disabled'}>${g.checked_in?'✓ Presente':'Check-in'}</button>
        <button class="row-menu" onclick="rowMenu(event,'${g.id}')">⋮</button></div>`;
    });
    h+=`</div>`;
    if(capped) h+=`<div style="text-align:center;color:var(--ink-soft);font-size:12.5px;margin-top:12px">Digite na busca para encontrar os demais ${totalFound-CAP} convidados.</div>`;
  }
  h+=`</div>`;
  $('#screen').innerHTML=h;
  updateConn();
  window.scrollTo(0,sy); _preserveScroll=false;
  if(_focusSearch){ const i=$('#searchInput'); if(i)i.focus(); _focusSearch=false; }
}
function hl(text,q){
  const t=esc(text==null?'':text);
  if(!q) return t;
  try{
    const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig');
    return t.replace(re,'<mark>$1</mark>');
  }catch(e){ return t; }
}
function chip(k,l,n){ return `<button class="chip ${state.filter===k?'on':''}" onclick="setFilter('${k}')">${l} · ${n}</button>`; }
let _searchT;
function onSearch(v){
  state.search=v;
  clearTimeout(_searchT);
  _searchT=setTimeout(()=>{
    renderEvent();
    const i=$('#searchInput'); if(i){ i.focus(); const L=i.value.length; i.setSelectionRange(L,L); }
  },90);
}
function clearSearch(){ state.search=''; _focusSearch=true; renderEvent(); }
function setFilter(f){ state.filter=f; renderEvent(); }
function setCatFilter(c){ state.catFilter=String(state.catFilter)===String(c)?'':c; renderEvent(); }
function setCompFilter(c){ state.compFilter=c||''; renderEvent(); }
async function manualRefresh(){
  const b=$('#refreshBtn'); if(b)b.classList.add('spin');
  await silentRefreshEvent();
  renderEvent(); toast('Lista atualizada');
}

function modalRoot(){ return $('#modalRoot'); }
function closeModal(){ if(_liveTimer){ clearInterval(_liveTimer); _liveTimer=null; } if(_qrScanner){ stopCam(); } modalRoot().innerHTML=''; importBuffer=null; }
function shell(t,b){ return `<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-head"><h3>${t}</h3><button class="x" onclick="closeModal()">×</button></div><div class="modal-body">${b}</div></div></div>`; }

function modalEvent(edit){
  const e=edit?state.current:{name:'',date:'',location:'',has_tables:false,use_categories:false};
  modalRoot().innerHTML=shell(edit?'Editar evento':'Novo evento',`
    <div class="field"><label>Nome do evento</label><input id="evName" value="${esc(e.name)}" placeholder="Ex: Jantar de Gala Fenavinho"></div>
    <div class="field"><label>Data</label><input id="evDate" type="date" value="${e.date||''}"></div>

    <div class="toggle-row" onclick="toggleCats()"><div><div class="t-lbl">Utilizar categorias de convidados</div><div class="t-sub">VIP, Imprensa, Patrocinador, etc. — opcional</div></div><div class="sw ${e.use_categories?'on':''}" id="swCats"></div></div>

    <button class="btn btn-primary btn-block" onclick="${edit?'submitEditEvent()':'submitNewEvent()'}">${edit?'Salvar alterações':'Criar evento'}</button>
    ${edit?`<button class="btn btn-ghost btn-block" style="margin-top:8px;color:var(--danger)" onclick="confirmDeleteEvent('${e.id}')">Excluir evento</button>`:''}`);

function toggleTables(){ const r=modalRoot(); r._tables=!r._tables; $('#swTables').classList.toggle('on',r._tables); }
function toggleCats(){ const r=modalRoot(); r._cats=!r._cats; $('#swCats').classList.toggle('on',r._cats); }
function submitNewEvent(){ const n=$('#evName').value.trim(); if(!n){toast('Informe o nome');return;} createEvent({name:n,date:$('#evDate').value,location:$('#evLoc').value.trim(),hasTables:!!modalRoot()._tables,useCategories:!!modalRoot()._cats}); }
function submitEditEvent(){ const n=$('#evName').value.trim(); if(!n){toast('Informe o nome');return;} updateEventMeta({name:n,date:$('#evDate').value,location:$('#evLoc').value.trim(),hasTables:!!modalRoot()._tables,useCategories:!!modalRoot()._cats}); }
function confirmDeleteEvent(id){ modalRoot().innerHTML=shell('Excluir evento',`<p style="color:var(--ink-soft);margin-bottom:16px;line-height:1.5">Tem certeza? A lista e os check-ins serão apagados <b>para todos os usuários</b>. Não pode ser desfeito.</p><button class="btn btn-block" style="background:var(--danger);color:#fff" onclick="deleteEventNow('${id}')">Sim, excluir</button><button class="btn btn-ghost btn-block" style="margin-top:8px" onclick="closeModal()">Cancelar</button>`); }

/* ============ MESAS ============ */
function tablesConfigured(){ return state.tables&&state.tables.length>0; }
function assignedByTable(){ const m={}; live(state.guests).forEach(g=>{ const t=(g.table_number||'').trim(); if(!t)return; m[t]=(m[t]||0)+1; }); return m; }
function presentByTable(){ const m={}; live(state.guests).forEach(g=>{ const t=(g.table_number||'').trim(); if(!t||!g.checked_in)return; m[t]=(m[t]||0)+1; }); return m; }
function overbookedList(){ const a=assignedByTable(); return state.tables.filter(t=>(a[t.name]||0)>t.capacity).map(t=>({name:t.name,assigned:a[t.name]||0,cap:t.capacity})); }
async function reloadTables(){
  if(!state.current) return;
  try{
    const tbs=await apiFetch('/api/checkin/events/'+state.current.id+'/tables');
    // ordena por sort_order
    state.tables=tbs.slice().sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
  }catch(e){ /* mantém */ }
}

async function modalTablesConfig(){ await reloadTables(); renderTablesConfig(); }
function renderTablesConfig(){
  const rows=state.tables.slice().sort((a,b)=>(a.sort_order||0)-(b.sort_order||0)).map(t=>{
    const a=assignedByTable()[t.name]||0; const over=a>t.capacity;
    return `<div class="tc-row ${over?'over':''}">
      <input class="tc-name" value="${esc(t.name)}" onchange="updTable('${t.id}',{name:this.value.trim()})">
      <input class="tc-cap" type="number" min="1" value="${t.capacity}" onchange="updTable('${t.id}',{capacity:Math.max(1,parseInt(this.value)||1)})">
      <span class="tc-occ ${over?'over':''}">${a}/${t.capacity}${over?' ⚠':''}</span>
      <button class="cat-mini danger" onclick="delTable('${t.id}')">🗑</button>
    </div>`;
  }).join('');
  modalRoot().innerHTML=shell('Configurar mesas',`
    <div class="import-help">Gere várias mesas iguais de uma vez ou ajuste uma a uma. A <b>capacidade</b> é usada para detectar overbooking e desenhar o mapa de lugares. O nome da mesa deve ser igual ao que está no campo "Mesa" dos convidados (ex: <b>1</b>, <b>2</b>, <b>Principal</b>).</div>
    <div class="tc-gen">
      <div class="field" style="flex:1;margin-bottom:0"><label>Qtd. de mesas</label><input id="genN" type="number" min="1" value="${state.tables.length||10}"></div>
      <div class="field" style="flex:1;margin-bottom:0"><label>Lugares por mesa</label><input id="genCap" type="number" min="1" value="8"></div>
    </div>
    <button class="btn btn-ghost btn-block" style="margin:10px 0 4px" onclick="generateTables()">↻ Gerar mesas numeradas</button>
    <div style="margin:14px 0 6px;font-weight:700;font-size:13px;color:var(--ink-soft)">Mesas configuradas (${state.tables.length})</div>
    <div class="tc-head"><span>Mesa</span><span>Lugares</span><span>Ocup.</span><span></span></div>
    <div id="tcList">${rows||'<div style="color:var(--ink-soft);font-size:13px;padding:8px 0">Nenhuma mesa. Gere acima ou adicione.</div>'}</div>
    <button class="btn btn-ghost btn-block" style="margin-top:10px" onclick="addTable()">+ Adicionar mesa avulsa</button>`);
}
async function generateTables(){
  const n=parseInt($('#genN').value)||0, cap=Math.max(1,parseInt($('#genCap').value)||8);
  if(n<1){ toast('Informe a quantidade'); return; }
  if(state.tables.length && !confirm('Isso substitui TODAS as mesas já configuradas por '+n+' mesas numeradas. Os convidados não são afetados. Continuar?')) return;
  try{ await apiFetch('/api/checkin/events/'+state.current.id+'/tables/generate',{method:'POST',body:JSON.stringify({count:n,capacity:cap})}); }
  catch(e){ toast('Erro ao gerar'); return; }
  await reloadTables(); renderTablesConfig(); toast(n+' mesas criadas');
}
async function addTable(){
  const next=String((state.tables.length?Math.max(...state.tables.map(t=>parseInt(t.name)||0)):0)+1);
  try{ await apiFetch('/api/checkin/events/'+state.current.id+'/tables',{method:'POST',body:JSON.stringify({name:next,capacity:8})}); }

/* ============ QR CODE ============ */
function qrSupported(){ return typeof QRCode!=='undefined'; }
function qrDataURL(text){
  return new Promise((res,rej)=>{
    if(!qrSupported()) return rej(new Error('lib'));
    QRCode.toDataURL(text,{margin:1,width:320,color:{dark:'#1d2433',light:'#ffffff'}},(e,url)=>{ e?rej(e):res(url); });
  });
}
function guestByToken(raw){
  let t=(raw||'').trim().toUpperCase();
  t=t.replace(/^MC:/,'');
  if(!t) return null;
  return live(state.guests).find(g=>(g.qr_token||'').toUpperCase()===t)||null;
}

function scanSubmit(){
  const i=$('#scanIn'); if(!i)return; const v=i.value; i.value='';
  handleScanToken(v); i.focus();

async function handleScanToken(raw){
  const now=Date.now(); const norm=(raw||'').trim().toUpperCase().replace(/^MC:/,'');
  if(!norm) return;
  if(norm===_lastScan.t && now-_lastScan.at<2500) return;
  _lastScan={t:norm,at:now};
  const box=$('#scanResult'); if(!box) return;
  let g=guestByToken(norm);
  // se não está em memória, consulta a API por qr
  if(!g){
    try{
      const p=await apiFetch('/api/checkin/lookup?qr='+encodeURIComponent(norm));
      if(p&&p.id){
        g=state.guests.find(x=>String(x.id)===String(p.id));
        if(!g){ g=normGuest(p); state.guests.push(g); }
        else { g.checked_in=!!p.checked_in_at; g.check_in_time=p.checked_in_at||g.check_in_time; }
      }
    }catch(e){ /* não encontrado */ }
  }
  if(!g){ box.className='scan-result err'; box.innerHTML=`<div class="sr-ic">✕</div><div><b>Não encontrado</b><div class="sr-sub">Código ${esc(norm)} não corresponde a nenhum convidado.</div></div>`; return; }
  if(g.checked_in){ box.className='scan-result warn'; box.innerHTML=`<div class="sr-ic">!</div><div><b>${esc(g.name)}</b><div class="sr-sub">Já estava presente desde ${fmtTime(g.check_in_time)}.${g.notes?' · 📝 '+esc(g.notes):''}</div></div>`; return; }
  // faz o check-in via API
  try{
    const r=await apiFetch('/api/checkin/register',{method:'POST',body:JSON.stringify({participant_id:g.id})});
    g.checked_in=true; g.check_in_time=r.checked_in_at||nowISO();
    refreshCount();
    if(state.view==='event'){ _preserveScroll=true; renderEvent(); }
    box.className='scan-result ok'; box.innerHTML=`<div class="sr-ic">✓</div><div><b>${esc(g.name)}</b><div class="sr-sub">Check-in realizado${g.table_number?' · Mesa '+esc(g.table_number):''}${g.company?' · '+esc(g.company):''}${g.notes?'<br>📝 '+esc(g.notes):''}</div></div>`;
  }catch(e){
    box.className='scan-result err'; box.innerHTML=`<div class="sr-ic">✕</div><div><b>Erro</b><div class="sr-sub">${esc(e.message)}</div></div>`;
  }
}
function toggleCam(){ if(_qrScanner)stopCam(); else startCam(); }
function startCam(){
  const msg=$('#camMsg'), btn=$('#camBtn');
  if(typeof Html5Qrcode==='undefined'){ if(msg)msg.textContent='Leitor de câmera não carregou (verifique a internet).'; return; }
  if(_qrScanner) return;
  try{
    _qrScanner=new Html5Qrcode('qrCam',{verbose:false});
    _qrScanner.start({facingMode:'environment'},{fps:10,qrbox:{width:230,height:230}},
      txt=>handleScanToken(txt),
      ()=>{}
    ).then(()=>{ if(msg)msg.textContent='Aponte o QR do convidado para a câmera.'; if(btn)btn.textContent='Parar câmera'; })
     .catch(e=>{ if(msg)msg.textContent='Não foi possível acessar a câmera. Permita o acesso no navegador.'; _qrScanner=null; });
  }catch(e){ if(msg)msg.textContent='Erro ao iniciar a câmera.'; _qrScanner=null; }
}
function stopCam(){
  if(_qrScanner){ try{ _qrScanner.stop().then(()=>{ try{_qrScanner.clear();}catch(e){} _qrScanner=null; }).catch(()=>{_qrScanner=null;}); }catch(e){ _qrScanner=null; } }
  const btn=$('#camBtn'); if(btn)btn.textContent='Iniciar câmera';
}

async function exportQRBadges(){
  if(!qrSupported()){ toast('Gerador de QR não carregou'); return; }
  const ev=state.current, G=live(state.guests).slice().sort((a,b)=>a.name.localeCompare(b.name,'pt-BR'));
  if(!G.length){ toast('Sem convidados'); return; }
  toast('Gerando crachás...');
  const urls={};
  for(const g of G){ try{ urls[g.id]=g.qr_token?await qrDataURL('MC:'+g.qr_token):null; }catch(e){ urls[g.id]=null; } }
  const { jsPDF }=window.jspdf; const doc=new jsPDF({unit:'mm',format:'a4'});
  const PW=210, PH=297, cols=3, rows=4, mx=10, my=12;
  const cw=(PW-2*mx)/cols, ch=(PH-2*my)/rows; const per=cols*rows;
  G.forEach((g,i)=>{
    const pos=i%per; if(i>0&&pos===0) doc.addPage();
    const col=pos%cols, row=Math.floor(pos/cols);
    const x=mx+col*cw, y=my+row*ch;
    doc.setDrawColor(217); doc.roundedRect(x+2,y+2,cw-4,ch-4,2,2,'S');
    const qrS=Math.min(cw,ch)-26; const qx=x+(cw-qrS)/2, qy=y+6;
    if(urls[g.id]) doc.addImage(urls[g.id],'PNG',qx,qy,qrS,qrS);
    doc.setTextColor(40); doc.setFont('helvetica','bold'); doc.setFontSize(10);
    doc.text(String(g.name).slice(0,28), x+cw/2, qy+qrS+6, {align:'center'});
    doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(110);
    const sub=[g.company,ev.has_tables&&g.table_number?'Mesa '+g.table_number:''].filter(Boolean).join(' · ');
    if(sub) doc.text(sub.slice(0,32), x+cw/2, qy+qrS+11, {align:'center'});
    doc.setTextColor(44,66,126); doc.setFontSize(9);
    doc.text(g.qr_token||'', x+cw/2, qy+qrS+16, {align:'center'});
  });
  doc.save(slug(ev.name)+'_crachas_qr.pdf'); toast('Crachás gerados');
}
