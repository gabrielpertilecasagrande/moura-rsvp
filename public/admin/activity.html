<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Atividades — Moura RSVP</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/img/favicon-16.png" />
  <link rel="apple-touch-icon" href="/assets/img/apple-touch-icon.png" />
  <link rel="stylesheet" href="/assets/css/styles.css" />
</head>
<body>
  <div class="admin-shell">
    <div id="shell"></div>
    <main class="main">
      <div class="page-head">
        <div>
          <div class="eyebrow">Administração</div>
          <h1>Atividades</h1>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn btn-ghost btn-sm" id="backupBtn">⬇ Baixar backup</button>
          <span id="refreshSlot"></span>
        </div>
      </div>
      <p class="muted" style="margin:-6px 0 18px">Registro das ações realizadas pelos usuários administrativos.</p>
      <div class="toolbar">
        <input class="search" type="text" id="search" placeholder="Filtrar por usuário, ação ou evento…" />
      </div>
      <div class="card" style="padding:0;overflow:hidden">
        <table class="cards">
          <thead><tr><th>Quando</th><th>Usuário</th><th>Ação</th><th>Detalhe</th></tr></thead>
          <tbody id="rows"><tr><td colspan="4" class="muted" style="padding:24px">Carregando…</td></tr></tbody>
        </table>
      </div>
    </main>
  </div>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/shell.js"></script>
  <script src="/assets/js/admin-activity.js"></script>
</body>
</html>
