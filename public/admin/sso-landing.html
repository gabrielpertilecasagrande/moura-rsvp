<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrando…</title>
</head>
<body>
  <p style="font-family:system-ui,sans-serif;color:#2C427E;padding:24px">Entrando…</p>
  <script>
    // Recebe a sessão emitida pelo SSO, grava sob a chave real do projeto
    // (moura_token — ver public/assets/js/api.js) e segue para a área admin.
    var p = new URLSearchParams(location.search), t = p.get('token');
    if (t) {
      localStorage.setItem('moura_token', t);
      var ev = p.get('event');
      location.replace(ev ? '/admin/event-detail.html?id=' + encodeURIComponent(ev)
                          : '/admin/dashboard.html');
    } else {
      location.replace('/admin/login.html');
    }
  </script>
</body>
</html>
