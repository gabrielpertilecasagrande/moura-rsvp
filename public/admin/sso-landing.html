<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <link rel="icon" href="/assets/img/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/img/favicon-16.png" />
  <link rel="apple-touch-icon" href="/assets/img/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrando…</title>
</head>
<body>
  <p style="font-family:system-ui,sans-serif;color:#2C427E;padding:24px">Entrando…</p>
  <script>
    // Troca o ref opaco por um token de sessão via fetch.
    // O JWT de sessão nunca aparece na URL nem no histórico do navegador.
    var ref = new URLSearchParams(location.search).get('ref');
    if (!ref) { location.replace('/admin/login.html'); }
    else {
      fetch('/api/auth/sso-session?ref=' + encodeURIComponent(ref))
        .then(function(r) { return r.ok ? r.json() : Promise.reject(r.status); })
        .then(function(d) {
          localStorage.setItem('moura_token', d.token);
          if (d.refresh_token) localStorage.setItem('moura_refresh', d.refresh_token);
          location.replace(d.event_id
            ? '/admin/event-detail.html?id=' + encodeURIComponent(d.event_id)
            : '/admin/dashboard.html');
        })
        .catch(function() { location.replace('/admin/login.html?sso=erro'); });
    }
  </script>
</body>
</html>
