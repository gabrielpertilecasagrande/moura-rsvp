<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Evento — Moura RSVP</title>
  <link rel="stylesheet" href="/assets/css/styles.css" />
</head>
<body>
  <div class="admin-shell">
    <div id="shell"></div>
    <main class="main">
      <div class="page-head">
        <div>
          <div class="eyebrow" id="eyebrow">Evento</div>
          <h1 id="evName">…</h1>
          <div class="meta muted" id="evMeta"></div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <a class="btn btn-ghost btn-sm" id="editBtn">Editar</a>
          <a class="btn btn-ghost btn-sm" id="openPublic" target="_blank">Ver página pública</a>
        </div>
      </div>

      <!-- Aviso de reabertura (aparece quando encerrado pelo prazo) -->
      <div id="reopenBanner"></div>

      <!-- Link público + QR -->
      <div class="card" style="margin-bottom:18px;display:flex;gap:16px;flex-wrap:wrap;align-items:center;justify-content:space-between">
        <div style="flex:1;min-width:220px">
          <div class="eyebrow" style="color:var(--muted)">Link público de confirmação</div>
          <code id="publicUrl" class="break-anywhere" style="font-size:14px;color:var(--navy)"></code>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-accent btn-sm" id="copyBtn">Copiar link</button>
          <button class="btn btn-ghost btn-sm" id="qrBtn">QR Code</button>
        </div>
      </div>

      <!-- Métricas de respostas -->
      <div class="stat-grid" id="pStats" style="grid-template-columns:repeat(4,1fr)"></div>

      <!-- Inclusão de participantes -->
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin:18px 0 6px">
        <button class="btn btn-primary btn-sm" id="addOneBtn">+ Adicionar nome</button>
        <button class="btn btn-ghost btn-sm" id="addBulkBtn">Incluir em lote</button>
      </div>

      <!-- Ferramentas -->
      <div class="toolbar">
        <div class="seg" id="seg">
          <button data-f="" class="active">Todos</button>
          <button data-f="confirmado">Confirmados</button>
          <button data-f="recusado">Recusados</button>
        </div>
        <input class="search" type="text" id="search" placeholder="Pesquisar por nome…" />
        <div class="spacer" style="flex:1"></div>
        <button class="btn btn-ghost btn-sm" id="csvBtn">CSV</button>
        <button class="btn btn-ghost btn-sm" id="xlsxBtn">Excel</button>
        <button class="btn btn-ghost btn-sm" id="pdfBtn">PDF</button>
      </div>

      <div class="table-wrap">
        <table class="cards">
          <thead><tr>
            <th>Nome</th><th>Empresa</th><th>Cargo</th><th>E-mail</th><th>Telefone</th>
            <th>Status</th><th>Data da resposta</th><th></th>
          </tr></thead>
          <tbody id="rows"><tr><td colspan="8" class="muted" style="padding:24px">Carregando…</td></tr></tbody>
        </table>
      </div>
    </main>
  </div>

  <div id="modalSlot"></div>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/shell.js"></script>
  <script src="/assets/js/admin-event-detail.js"></script>
</body>
</html>
