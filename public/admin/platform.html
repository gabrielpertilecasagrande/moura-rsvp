<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Plataforma — Moura RSVP</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/img/favicon-16.png" />
  <link rel="apple-touch-icon" href="/assets/img/apple-touch-icon.png" />
  <link rel="stylesheet" href="/assets/css/styles.css" />
</head>
<body>
  <div class="admin-shell">
    <div id="shell"></div>
    <main class="main">
      <div class="page-head">
        <div>
          <div class="eyebrow">Operação da plataforma</div>
          <h1>Organizadores</h1>
        </div>
        <button class="btn btn-primary btn-sm" id="newOrgBtn">Novo organizador</button>
      </div>
      <p class="muted" style="margin:-6px 0 22px">Cada organizador tem banco de dados isolado. Provisione novos clientes e faça backups aqui.</p>

      <div class="card table-card" style="padding:0;overflow:hidden">
        <table class="cards">
          <thead>
            <tr><th>Slug</th><th>Nome</th><th>Criado em</th><th style="text-align:right">Ações</th></tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </main>
  </div>
  <div id="modalSlot"></div>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/shell.js"></script>
  <script src="/assets/js/admin-platform.js"></script>
</body>
</html>
