[deploy]
healthcheckPath = "/api/health"
# Boot do RSVP é multi-tenant: abre vários bancos, roda seed e (se necessário)
# migração. Em cold start isso pode passar de 30s. Damos uma janela folgada
# (300s) e mais tentativas para o Railway não marcar o deploy como "crashed"
# por impaciência — alinhado ao moura-checkin.
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
