<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Usuários — Moura RSVP</title>
  <link rel="stylesheet" href="/assets/css/styles.css" />
</head>
<body>
  <div class="admin-shell">
    <div id="shell"></div>
    <main class="main">
      <div class="page-head">
        <div>
          <div class="eyebrow">Administração</div>
          <h1>Usuários</h1>
        </div>
        <button class="btn btn-primary btn-sm" id="newUserBtn">Novo usuário</button>
      </div>
      <p class="muted" style="margin:-6px 0 22px">Aprove solicitações de acesso, defina permissões e gerencie as contas do sistema.</p>

      <div id="pendingWrap"></div>

      <div class="card" style="padding:0;overflow:hidden">
        <table>
          <thead>
            <tr><th>Nome</th><th>E-mail</th><th>Permissão</th><th>Situação</th><th style="text-align:right">Ações</th></tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </main>
  </div>
  <div id="modalSlot"></div>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/shell.js"></script>
  <script src="/assets/js/admin-users.js"></script>
</body>
</html>
